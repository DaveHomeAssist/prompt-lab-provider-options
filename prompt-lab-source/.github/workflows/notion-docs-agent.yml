name: Notion Docs Agent

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - '**/*.md'
      - '.github/workflows/*.yml'
      - '.github/workflows/*.yaml'
      - 'scripts/notion-docs-agent.*'
  workflow_run:
    workflows:
      - Extension CI
      - Desktop Build
      - GitHub Pages
    types:
      - completed

permissions:
  contents: read
  actions: read

jobs:
  sync-notion-docs:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc

      - name: Push GitHub run context into Notion
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          NOTION_PARENT_PAGE_ID: ${{ secrets.NOTION_PARENT_PAGE_ID }}
          NOTION_DOCS_PAGE_TITLE: ${{ vars.NOTION_DOCS_PAGE_TITLE || 'Prompt Lab GitHub Docs Sync' }}
          DOCS_AGENT_PROVIDER: ${{ vars.DOCS_AGENT_PROVIDER || 'none' }}
          DOCS_AGENT_MODEL: ${{ vars.DOCS_AGENT_MODEL || 'gpt-4.1-mini' }}
          DOCS_AGENT_MAX_DOCS: ${{ vars.DOCS_AGENT_MAX_DOCS || '6' }}
          DOCS_AGENT_MAX_CHARS_PER_DOC: ${{ vars.DOCS_AGENT_MAX_CHARS_PER_DOC || '5000' }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: node scripts/notion-docs-agent.mjs
