<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Prompt Lab — Settings</title>
  <style>
    body { font-family: system-ui, sans-serif; background: #0f0f13; color: #e2e8f0;
      display: flex; align-items: center; justify-content: center; min-height: 100vh; margin: 0; }
    .box { background: #1a1a24; border: 1px solid #2d2d3d; border-radius: 12px;
      padding: 2rem; width: 100%; max-width: 460px; display: flex; flex-direction: column; gap: 1rem; }
    h1 { font-size: 1.1rem; font-weight: 700; color: #a78bfa; margin: 0; }
    p { margin: 0; font-size: .78rem; color: #94a3b8; line-height: 1.4; }
    label { display: block; font-size: .8rem; color: #94a3b8; margin-bottom: .28rem; }
    input, select {
      width: 100%; background: #0f0f13; border: 1.5px solid #2d2d3d; border-radius: 8px;
      padding: .6rem .8rem; font-size: .85rem; color: #e2e8f0; font-family: monospace;
      box-sizing: border-box;
    }
    select { font-family: system-ui, sans-serif; }
    input:focus, select:focus { outline: none; border-color: #7c3aed; }
    button {
      background: #7c3aed; color: white; border: none; border-radius: 8px;
      padding: .65rem; font-size: .85rem; font-weight: 600; cursor: pointer;
    }
    button:hover { background: #6d28d9; }
    .status { font-size: .78rem; color: #4ade80; min-height: 1.2rem; }
    .link-row { display: flex; flex-wrap: wrap; gap: .9rem; }
    a { font-size: .72rem; color: #7c3aed; text-decoration: none; }
    a:hover { text-decoration: underline; }
    .section { display: flex; flex-direction: column; gap: .7rem; }
    .hidden { display: none; }
  </style>
</head>
<body>
  <div class="box">
    <h1>⚡ Prompt Lab Settings</h1>
    <p>Select a provider. Anthropic uses an API key. Ollama runs locally on your machine.</p>

    <div>
      <label for="provider">Provider</label>
      <select id="provider">
        <option value="anthropic">Anthropic API</option>
        <option value="ollama">Ollama (local)</option>
      </select>
    </div>

    <div id="anthropicSection" class="section">
      <div>
        <label for="key">Anthropic API Key</label>
        <input type="password" id="key" placeholder="sk-ant-..." autocomplete="off">
      </div>
    </div>

    <div id="ollamaSection" class="section hidden">
      <div>
        <label for="ollamaBaseUrl">Ollama Base URL</label>
        <input type="text" id="ollamaBaseUrl" placeholder="http://localhost:11434" autocomplete="off">
      </div>
      <div>
        <label for="ollamaModel">Ollama Model</label>
        <input type="text" id="ollamaModel" placeholder="llama3.2:3b" autocomplete="off">
      </div>
    </div>

    <button id="saveBtn">Save Settings</button>
    <div class="status" id="status"></div>
    <div class="link-row">
      <a href="https://console.anthropic.com/settings/keys" target="_blank" rel="noreferrer">Anthropic keys →</a>
      <a href="https://ollama.com/library" target="_blank" rel="noreferrer">Ollama models →</a>
    </div>
  </div>
  <script src="options.js"></script>
</body>
</html>
