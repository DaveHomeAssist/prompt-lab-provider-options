<!DOCTYPE html>
<!-- CANONICAL PROMPT LAB TOOL — DO NOT DELETE
Listed in docs/CANONICAL_TOOLS.md. Owned by @DaveHomeAssist.

<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Prompt Embed — Prompt Lab</title>
<meta name="description" content="Generate structured prompts for flyers, products, tool specs, and interactive concepts with Prompt Lab's standalone embed builder.">
<link rel="canonical" href="https://promptlab.tools/prompt-embed.html">
<link rel="icon" type="image/png" href="./hero-logo.png">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

:root{
--bg:#0d0d0f;--surface:#16161a;--border:#2a2a35;--text:#e8e8f0;--muted:#8888a0;
--accent:#FF2D78;--radius:6px;--gap:10px;
--font-ui:system-ui,-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
--font-mono:ui-monospace,'SF Mono',SFMono-Regular,'Cascadia Code','Consolas',monospace;
}
@media(prefers-color-scheme:light){
:root:not([data-theme="dark"]){
--bg:#f5f5f7;--surface:#ffffff;--border:#e0e0e8;--text:#1a1a2e;
}}
:root[data-theme="light"]{
--bg:#f5f5f7;--surface:#ffffff;--border:#e0e0e8;--text:#1a1a2e;
}
:root[data-theme="dark"]{
--bg:#0d0d0f;--surface:#16161a;--border:#2a2a35;--text:#e8e8f0;
}

html{font-size:15px}
:root[data-compact="true"]{font-size:13px}
:root[data-compact="true"] .wrap{padding:8px 10px}

body{
background:var(--bg);color:var(--text);font-family:var(--font-ui);
line-height:1.45;-webkit-font-smoothing:antialiased;
}

.wrap{max-width:900px;margin:0 auto;padding:12px 16px}

/* ── Header ── */
.hdr{display:flex;flex-wrap:wrap;align-items:center;gap:8px;margin-bottom:var(--gap)}
.hdr-title{font-size:.85rem;font-weight:600;letter-spacing:.02em;white-space:nowrap;opacity:.7}

/* ── Preset strip ── */
.presets{display:flex;flex-wrap:wrap;gap:4px;flex:1;justify-content:flex-end}
.preset-btn{
background:var(--surface);border:1px solid var(--border);color:var(--muted);
border-radius:var(--radius);padding:4px 10px;font:inherit;font-size:.78rem;
cursor:pointer;transition:border-color .15s,color .15s;
}
.preset-btn:focus-visible{outline:2px solid var(--accent);outline-offset:1px}
.preset-btn[aria-pressed="true"]{border-color:var(--accent);color:var(--text);font-weight:600}

/* ── Form ── */
.fields{display:flex;flex-direction:column;gap:var(--gap)}
.field label{display:block;font-size:.75rem;font-weight:500;margin-bottom:3px;color:var(--muted)}
.field label .req{color:var(--accent);margin-left:2px}
.field input,.field textarea{
width:100%;background:var(--surface);border:1px solid var(--border);
color:var(--text);border-radius:var(--radius);padding:7px 9px;
font:inherit;font-size:.85rem;resize:vertical;
}
.field input:focus,.field textarea:focus{
outline:none;border-color:var(--accent);box-shadow:0 0 0 2px color-mix(in srgb,var(--accent) 25%,transparent);
}
.field textarea{rows:4;min-height:3.6em;max-height:8em}

/* ── Output ── */
.output-wrap{margin-top:var(--gap)}
.output-label{font-size:.75rem;font-weight:500;color:var(--muted);margin-bottom:3px}
.output{
background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);
padding:9px 10px;font-family:var(--font-mono);font-size:.8rem;line-height:1.5;
white-space:pre-wrap;word-break:break-word;overflow-y:auto;max-height:18em;min-height:4em;
color:var(--text);
}
.output.placeholder{color:var(--muted);font-style:italic}

/* ── Copy button ── */
.copy-btn{
display:block;width:100%;margin-top:var(--gap);padding:10px;
background:var(--accent);color:#fff;border:none;border-radius:var(--radius);
font:inherit;font-size:.85rem;font-weight:600;letter-spacing:.04em;cursor:pointer;
transition:opacity .15s;
}
.copy-btn:hover{opacity:.88}
.copy-btn:focus-visible{outline:2px solid var(--text);outline-offset:2px}
.copy-btn:disabled{opacity:.5;cursor:default}
.copy-btn.copied{background:#22c55e}

@media(prefers-reduced-motion:reduce){
.copy-btn,.preset-btn,.field input,.field textarea{transition:none}
}

/* ── Footer ── */
.foot{
margin-top:var(--gap);font-size:.7rem;color:var(--muted);text-align:center;padding:4px 0;
}
.foot a{color:var(--muted);text-decoration:underline;text-underline-offset:2px}
.foot a:hover{color:var(--text)}
.foot a:focus-visible{outline:2px solid var(--accent);outline-offset:1px}

/* ── Responsive ── */
@media(max-width:420px){
.hdr{flex-direction:column;align-items:flex-start}
.presets{justify-content:flex-start}
}
</style>
</head>
<body>
<div class="wrap">
  <header class="hdr">
    <span class="hdr-title">Prompt Lab</span>
    <nav class="presets" role="radiogroup" aria-label="Preset selector" id="presetNav"></nav>
  </header>
  <form id="form" class="fields" autocomplete="off" novalidate></form>
  <div class="output-wrap">
    <div class="output-label">Generated Prompt</div>
    <div class="output placeholder" id="output" role="region" aria-live="polite" aria-label="Generated prompt output">Fill in the required fields above to generate a prompt.</div>
  </div>
  <button type="button" class="copy-btn" id="copyBtn" disabled>COPY PROMPT</button>
  <footer class="foot">Full tool at <a href="https://promptlab.tools" target="_blank" rel="noopener">promptlab.tools</a></footer>
</div>
<script>
(function(){
"use strict";

/* ── Presets ── */
var PRESETS = [
{id:"flyer",label:"Flyer",accent:"#FF2D78",fields:[
{id:"event_name",label:"Event Name",type:"text",required:true},
{id:"date",label:"Date & Time",type:"text",required:true},
{id:"admission",label:"Admission",type:"text",required:true},
{id:"location",label:"Location",type:"text",required:false},
{id:"features",label:"Highlights (one per line)",type:"textarea",required:false},
{id:"aesthetic",label:"Visual Vibe",type:"text",required:false},
{id:"cta_url",label:"CTA / RSVP URL",type:"url",required:false}
],example:{event_name:"Neon Skyline Festival 2026",date:"Saturday July 18, 8 PM — 2 AM",admission:"$25 advance / $35 door",location:"Rooftop Deck, The Lumen Building, Austin TX",features:"Live DJ sets from Kaia & Drift\nProjection-mapped visuals\nCraft cocktail pop-ups\nMidnight balloon drop",aesthetic:"Y2K chrome meets tropical sunset — iridescent gradients, bold sans-serif type, film-grain overlays",cta_url:"https://example.com/rsvp"},
promptTpl:function(d){
var s="You are a senior graphic designer and event marketing copywriter.\n\n";
s+="TASK: Design and write copy for a promotional flyer for the following event.\n\n";
s+="EVENT DETAILS:\n";
s+="- Name: "+d.event_name+"\n";
s+="- Date & Time: "+d.date+"\n";
s+="- Admission: "+d.admission+"\n";
if(d.location)s+="- Location: "+d.location+"\n";
if(d.features)s+="\nHIGHLIGHTS:\n"+d.features.split("\n").filter(Boolean).map(function(l){return"- "+l}).join("\n")+"\n";
if(d.aesthetic)s+="\nDESIGN DIRECTION: "+d.aesthetic+"\n";
if(d.cta_url)s+="\nCTA LINK: "+d.cta_url+"\n";
s+="\nCONSTRAINTS:\n- Output print-ready flyer copy with headline, subhead, body, and CTA\n- Keep total word count under 120\n- All text must be legible at arm's length on a standard poster";
return s}
},
{id:"product",label:"Product",accent:"#00E5FF",fields:[
{id:"product_name",label:"Product Name",type:"text",required:true},
{id:"tagline",label:"Tagline",type:"text",required:true},
{id:"problem",label:"Problem It Solves",type:"textarea",required:true},
{id:"features",label:"Key Features (one per line)",type:"textarea",required:false},
{id:"cta_url",label:"CTA URL",type:"url",required:false}
],example:{product_name:"Airframe Pro",tagline:"Silence is a feature",problem:"Open-plan offices destroy deep work. Noise-cancelling headphones help, but they isolate you from important cues like someone saying your name or a fire alarm.",features:"Adaptive transparency that passes speech directed at you\n40 dB active cancellation for ambient noise\n18-hour battery with 10-minute fast charge\nSpatial audio for video calls",cta_url:"https://example.com/airframe"},
promptTpl:function(d){
var s="You are a product marketing strategist and conversion copywriter.\n\n";
s+="TASK: Write a compelling product landing page copy block for the product described below.\n\n";
s+="PRODUCT:\n";
s+="- Name: "+d.product_name+"\n";
s+="- Tagline: "+d.tagline+"\n";
s+="\nPROBLEM STATEMENT:\n"+d.problem+"\n";
if(d.features)s+="\nKEY FEATURES:\n"+d.features.split("\n").filter(Boolean).map(function(l){return"- "+l}).join("\n")+"\n";
if(d.cta_url)s+="\nCTA LINK: "+d.cta_url+"\n";
s+="\nCONSTRAINTS:\n- Output: headline, sub-headline, 3 benefit blocks (icon-ready), and a CTA line\n- Tone: confident, concise, zero jargon\n- Total word count under 150";
return s}
},
{id:"tool",label:"Tool",accent:"#39FF14",fields:[
{id:"tool_name",label:"Tool Name",type:"text",required:true},
{id:"purpose",label:"What It Does",type:"text",required:true},
{id:"inputs",label:"User Inputs (one per line)",type:"textarea",required:true},
{id:"outputs",label:"Outputs (one per line)",type:"textarea",required:true},
{id:"constraints",label:"Constraints",type:"textarea",required:false}
],example:{tool_name:"Schema Genie",purpose:"Generates validated JSON Schema from a plain-English description of a data model",inputs:"Plain-English model description\nTarget JSON Schema draft version (default: 2020-12)\nOptional example payload",outputs:"JSON Schema document\nValidation report against example payload (if provided)\nTypeScript interface equivalent",constraints:"Must produce schemas that pass ajv strict mode\nNo $ref to external URIs\nMax schema depth: 5 levels"},
promptTpl:function(d){
var s="You are a developer tools product designer and technical writer.\n\n";
s+="TASK: Write the system prompt and user-facing description for the following tool.\n\n";
s+="TOOL:\n";
s+="- Name: "+d.tool_name+"\n";
s+="- Purpose: "+d.purpose+"\n";
s+="\nUSER INPUTS:\n"+d.inputs.split("\n").filter(Boolean).map(function(l){return"- "+l}).join("\n")+"\n";
s+="\nOUTPUTS:\n"+d.outputs.split("\n").filter(Boolean).map(function(l){return"- "+l}).join("\n")+"\n";
if(d.constraints)s+="\nCONSTRAINTS:\n"+d.constraints.split("\n").filter(Boolean).map(function(l){return"- "+l}).join("\n")+"\n";
s+="\nDELIVERABLES:\n- A system prompt (under 300 words) that an LLM would receive to act as this tool\n- A 2-sentence user-facing description for a tool directory listing";
return s}
},
{id:"interactive",label:"Interactive",accent:"#FF6A00",fields:[
{id:"experience_name",label:"Experience Name",type:"text",required:true},
{id:"concept",label:"Core Concept",type:"textarea",required:true},
{id:"interaction_model",label:"How User Interacts",type:"textarea",required:true},
{id:"tone",label:"Tone / Aesthetic",type:"text",required:false}
],example:{experience_name:"Parallel Lives",concept:"A branching narrative game where each choice splits the story into two timelines the player can switch between freely. Events in one timeline ripple into the other with a 3-turn delay.",interaction_model:"Player reads a short scene (2-3 paragraphs) and picks from 2 choices. After choosing, they can tap a SPLIT VIEW button to see both timelines side by side. Every 3 turns, a RIPPLE event fires showing how the unchosen path changed the current one.",tone:"Murakami meets Black Mirror — calm prose, surreal consequences, muted earth tones with one neon accent per timeline"},
promptTpl:function(d){
var s="You are an interactive experience designer and narrative engineer.\n\n";
s+="TASK: Design the interaction loop and opening sequence for the following experience.\n\n";
s+="EXPERIENCE:\n";
s+="- Name: "+d.experience_name+"\n";
s+="\nCORE CONCEPT:\n"+d.concept+"\n";
s+="\nINTERACTION MODEL:\n"+d.interaction_model+"\n";
if(d.tone)s+="\nTONE / AESTHETIC: "+d.tone+"\n";
s+="\nDELIVERABLES:\n- State machine diagram (text format) for the core loop\n- Opening scene script (under 200 words)\n- 2 branching choice sets for the first decision point\n- Brief UX note on how state is communicated visually";
return s}
}
];

var PRESET_MAP = {};
PRESETS.forEach(function(p){PRESET_MAP[p.id]=p});

/* ── URL params ── */
var params = new URLSearchParams(window.location.search);
var paramPreset = params.get("preset");
var paramExample = params.get("example") === "true";
var paramTheme = params.get("theme");
var paramCompact = params.get("compact") === "true";

if(paramTheme === "light" || paramTheme === "dark") document.documentElement.setAttribute("data-theme", paramTheme);
if(paramCompact) document.documentElement.setAttribute("data-compact", "true");

/* ── DOM refs ── */
var presetNav = document.getElementById("presetNav");
var form = document.getElementById("form");
var output = document.getElementById("output");
var copyBtn = document.getElementById("copyBtn");

var activePreset = null;
var debounceTimer = null;

/* ── Build preset buttons ── */
PRESETS.forEach(function(p){
  var btn = document.createElement("button");
  btn.type = "button";
  btn.className = "preset-btn";
  btn.textContent = p.label;
  btn.setAttribute("role", "radio");
  btn.setAttribute("aria-checked", "false");
  btn.setAttribute("aria-pressed", "false");
  btn.setAttribute("data-preset", p.id);
  btn.addEventListener("click", function(){ activate(p.id) });
  presetNav.appendChild(btn);
});

/* ── Activate preset ── */
function activate(id){
  var p = PRESET_MAP[id];
  if(!p) return;
  activePreset = p;

  document.documentElement.style.setProperty("--accent", p.accent);

  /* Update buttons */
  var btns = presetNav.querySelectorAll(".preset-btn");
  for(var i=0;i<btns.length;i++){
    var on = btns[i].getAttribute("data-preset") === id;
    btns[i].setAttribute("aria-pressed", on ? "true" : "false");
    btns[i].setAttribute("aria-checked", on ? "true" : "false");
  }

  /* Build form */
  form.innerHTML = "";
  p.fields.forEach(function(f){
    var div = document.createElement("div");
    div.className = "field";
    var lbl = document.createElement("label");
    lbl.setAttribute("for", "f-"+f.id);
    lbl.textContent = f.label;
    if(f.required){
      var req = document.createElement("span");
      req.className = "req";
      req.setAttribute("aria-hidden", "true");
      req.textContent = "*";
      lbl.appendChild(req);
    }
    div.appendChild(lbl);

    var el;
    if(f.type === "textarea"){
      el = document.createElement("textarea");
      el.rows = 4;
    } else {
      el = document.createElement("input");
      el.type = f.type === "url" ? "url" : "text";
    }
    el.id = "f-"+f.id;
    el.name = f.id;
    if(f.required) el.required = true;
    el.setAttribute("aria-required", f.required ? "true" : "false");

    if(paramExample && p.example && p.example[f.id] != null){
      el.value = p.example[f.id];
    }

    el.addEventListener("input", scheduleGenerate);
    div.appendChild(el);
    form.appendChild(div);
  });

  generate();
}

/* ── Debounced generate ── */
function scheduleGenerate(){
  clearTimeout(debounceTimer);
  debounceTimer = setTimeout(generate, 300);
}

/* ── Prompt generation ── */
function generate(){
  if(!activePreset){
    showPlaceholder("Select a preset to begin.");
    return;
  }

  var data = {};
  var missingRequired = [];
  activePreset.fields.forEach(function(f){
    var el = document.getElementById("f-"+f.id);
    var val = el ? el.value.trim() : "";
    if(f.required && !val){
      missingRequired.push(f.label);
      data[f.id] = "[" + f.label + " — required]";
    } else if(val){
      data[f.id] = val;
    } else {
      data[f.id] = "";
    }
  });

  if(missingRequired.length > 0){
    showPlaceholder("Fill in required fields to generate: " + missingRequired.join(", "));
    return;
  }

  var text = activePreset.promptTpl(data);
  output.textContent = text;
  output.classList.remove("placeholder");
  copyBtn.disabled = false;
}

function showPlaceholder(msg){
  output.textContent = msg;
  output.classList.add("placeholder");
  copyBtn.disabled = true;
}

/* ── Copy ── */
copyBtn.addEventListener("click", function(){
  if(copyBtn.disabled) return;
  var text = output.textContent;
  if(!text) return;

  var ok = false;
  if(navigator.clipboard && navigator.clipboard.writeText){
    navigator.clipboard.writeText(text).then(flash, fallbackCopy);
  } else {
    fallbackCopy();
  }

  function fallbackCopy(){
    var ta = document.createElement("textarea");
    ta.value = text;
    ta.style.position = "fixed";
    ta.style.opacity = "0";
    document.body.appendChild(ta);
    ta.select();
    try{ document.execCommand("copy"); flash(); }catch(e){}
    document.body.removeChild(ta);
  }

  function flash(){
    copyBtn.textContent = "COPIED";
    copyBtn.classList.add("copied");
    setTimeout(function(){
      copyBtn.textContent = "COPY PROMPT";
      copyBtn.classList.remove("copied");
    }, 2000);
  }
});

/* ── Init ── */
var startPreset = (paramPreset && PRESET_MAP[paramPreset]) ? paramPreset : "flyer";
activate(startPreset);

})();
</script>
</body>
</html>
