<!DOCTYPE html>
<!-- CANONICAL PROMPT LAB TOOL — DO NOT DELETE
Listed in docs/CANONICAL_TOOLS.md. Owned by @DaveHomeAssist.
-->
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Prompt Explorer — Prompt Lab</title>
<meta name="description" content="Standalone Prompt Lab explorer for branching prompts, comparing variants, and generating image directions with your own API key.">
<link rel="canonical" href="https://promptlab.tools/prompt-explorer">
<link rel="icon" type="image/png" href="./hero-logo.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@0,600;1,400&family=DM+Sans:wght@300;400;500&family=DM+Mono:wght@400&display=swap" rel="stylesheet">
<style>
  :root {
    --walnut-deep:   #1a0f08;
    --walnut-mid:    #2c1a0e;
    --walnut-light:  #3d2614;
    --walnut-grain:  #4a2f18;
    --cream:         #f0e6c8;
    --cream-dim:     #c8b78a;
    --cream-faint:   rgba(240,230,200,0.08);
    --soil:          #2c1f0e;
    --sun:           #e8c84a;
    --leaf:          #7aaa38;
    --leaf-dim:      #4a7a1e;
    --leaf-faint:    rgba(122,170,56,0.15);
    --sage:          #8aaa68;
    --sage-glow:     rgba(138,170,104,0.25);
    --amber:         #c8860a;
    --amber-faint:   rgba(200,134,10,0.18);
    --connector:     rgba(240,230,200,0.35);
    --border-node:   rgba(240,230,200,0.18);
    --border-hover:  rgba(240,230,200,0.35);
    --shadow-node:   0 2px 12px rgba(0,0,0,0.4);
    --shadow-active: 0 0 0 2px var(--sage), 0 0 18px var(--sage-glow), 0 2px 12px rgba(0,0,0,0.5);
    --shadow-indirect: 0 0 0 1.5px var(--amber), 0 0 12px var(--amber-faint);
    --r: 20px;
    --r-sm: 10px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--walnut-deep);
    color: var(--cream);
    height: 100vh;
    overflow: hidden;
    display: flex;
    flex-direction: column;
  }

  /* Wood grain texture overlay */
  body::before {
    content: '';
    position: fixed; inset: 0;
    background-image:
      repeating-linear-gradient(
        92deg,
        transparent 0px,
        transparent 3px,
        rgba(255,255,255,0.012) 3px,
        rgba(255,255,255,0.012) 4px,
        transparent 4px,
        transparent 9px,
        rgba(0,0,0,0.06) 9px,
        rgba(0,0,0,0.06) 11px
      ),
      repeating-linear-gradient(
        88deg,
        transparent 0px,
        transparent 7px,
        rgba(255,255,255,0.008) 7px,
        rgba(255,255,255,0.008) 8px
      );
    pointer-events: none;
    z-index: 0;
  }

  /* ── TOP BAR ── */
  .topbar {
    position: relative; z-index: 10;
    display: flex; align-items: center; justify-content: space-between;
    padding: 10px 18px;
    background: rgba(26,15,8,0.85);
    border-bottom: 1px solid rgba(240,230,200,0.1);
    backdrop-filter: blur(4px);
    flex-shrink: 0;
    gap: 12px;
  }

  .breadcrumb {
    display: flex; align-items: center; gap: 6px;
    font-family: 'DM Sans', sans-serif;
    font-size: 15px; font-weight: 300;
    color: var(--cream-dim);
    flex-wrap: wrap;
  }
  .bc-item {
    cursor: pointer;
    transition: color 0.15s;
    padding: 2px 4px;
    border-radius: 4px;
  }
  .bc-item:hover { color: var(--cream); }
  .bc-item.active { color: var(--cream); font-weight: 400; }
  .bc-sep { color: rgba(240,230,200,0.3); font-size: 14px; }

  .topbar-actions { display: flex; gap: 8px; flex-shrink: 0; }

  .tb-btn {
    font-family: 'DM Sans', sans-serif;
    font-size: 14px; font-weight: 400;
    padding: 6px 14px;
    border-radius: var(--r-sm);
    border: 1px solid rgba(240,230,200,0.2);
    background: rgba(240,230,200,0.06);
    color: var(--cream-dim);
    cursor: pointer;
    transition: all 0.15s;
    white-space: nowrap;
  }
  .tb-btn:hover {
    background: rgba(240,230,200,0.12);
    color: var(--cream);
    border-color: rgba(240,230,200,0.35);
  }
  .tb-btn.active-btn {
    background: var(--amber-faint);
    border-color: var(--amber);
    color: #f0b840;
  }
  .tb-btn.primary {
    background: rgba(122,170,56,0.18);
    border-color: var(--leaf);
    color: #c8e882;
  }
  .tb-btn.primary:hover {
    background: rgba(122,170,56,0.28);
  }

  .settings-pop {
    position: relative;
  }

  .settings-pop summary {
    list-style: none;
  }

  .settings-pop summary::-webkit-details-marker {
    display: none;
  }

  .settings-panel {
    position: absolute;
    top: calc(100% + 10px);
    right: 0;
    width: 360px;
    max-width: min(92vw, 360px);
    padding: 14px;
    border-radius: 14px;
    background: rgba(32, 20, 10, 0.96);
    border: 1px solid rgba(240,230,200,0.16);
    box-shadow: 0 12px 36px rgba(0,0,0,0.42);
    display: none;
  }

  .settings-pop[open] .settings-panel {
    display: block;
  }

  .settings-grid {
    display: grid;
    gap: 12px;
  }

  .settings-field {
    display: flex;
    flex-direction: column;
    gap: 6px;
  }

  .settings-field span {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: rgba(240,230,200,0.6);
    letter-spacing: 0.06em;
    text-transform: uppercase;
  }

  .settings-field input {
    width: 100%;
    border-radius: 10px;
    border: 1px solid rgba(240,230,200,0.14);
    background: rgba(240,230,200,0.05);
    color: var(--cream);
    padding: 10px 12px;
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    outline: none;
  }

  .settings-field select {
    width: 100%;
    border-radius: 10px;
    border: 1px solid rgba(240,230,200,0.14);
    background: rgba(240,230,200,0.05);
    color: var(--cream);
    padding: 10px 12px;
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    outline: none;
  }

  .settings-field input:focus,
  .settings-field select:focus {
    border-color: rgba(122,170,56,0.55);
  }

  .settings-note {
    margin-top: 10px;
    color: rgba(240,230,200,0.56);
    font-size: 12px;
    line-height: 1.5;
  }

  .settings-actions {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    margin-top: 12px;
  }

  .settings-meta {
    margin-top: 8px;
    color: rgba(240,230,200,0.48);
    font-size: 11px;
  }

  .saved-library {
    margin-top: 18px;
    padding-top: 14px;
    border-top: 1px solid rgba(240,230,200,0.12);
  }

  .saved-library-head {
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    gap: 10px;
    margin-bottom: 10px;
  }

  .saved-library-title {
    font-family: 'Fraunces', serif;
    font-size: 16px;
    color: var(--cream);
  }

  .saved-library-meta {
    font-size: 11px;
    color: rgba(240,230,200,0.5);
  }

  .saved-library-list {
    display: flex;
    flex-direction: column;
    gap: 10px;
    max-height: 190px;
    overflow: auto;
    padding-right: 4px;
  }

  .saved-item {
    display: grid;
    grid-template-columns: 56px 1fr auto;
    gap: 10px;
    align-items: center;
    padding: 9px;
    border-radius: 12px;
    background: rgba(240,230,200,0.04);
    border: 1px solid rgba(240,230,200,0.1);
  }

  .saved-thumb {
    width: 56px;
    height: 56px;
    border-radius: 10px;
    overflow: hidden;
    background: rgba(240,230,200,0.06);
    display: flex;
    align-items: center;
    justify-content: center;
    color: rgba(240,230,200,0.45);
    font-size: 11px;
    text-align: center;
  }

  .saved-thumb img {
    width: 100%;
    height: 100%;
    object-fit: cover;
  }

  .saved-body {
    min-width: 0;
  }

  .saved-label {
    font-size: 14px;
    color: var(--cream);
    margin-bottom: 4px;
  }

  .saved-sub {
    font-size: 11px;
    color: rgba(240,230,200,0.52);
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  .saved-actions {
    display: flex;
    flex-direction: column;
    gap: 6px;
  }

  .saved-actions .prev-btn {
    text-align: center;
    min-width: 66px;
  }

  .saved-empty {
    color: rgba(240,230,200,0.45);
    font-size: 12px;
    line-height: 1.5;
    padding: 4px 0 2px;
  }

  /* ── MAIN LAYOUT ── */
  .main {
    position: relative; z-index: 1;
    display: flex;
    flex: 1;
    overflow: hidden;
  }

  /* ── TREE CANVAS ── */
  .tree-canvas {
    flex: 1;
    position: relative;
    overflow: hidden;
    padding: 24px 20px 20px;
    display: flex;
    flex-direction: column;
  }

  .canvas-label {
    font-family: 'Fraunces', serif;
    font-size: 13px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: rgba(240,230,200,0.3);
    margin-bottom: 16px;
    flex-shrink: 0;
  }

  .tree-scroll {
    flex: 1;
    overflow: auto;
    position: relative;
  }

  /* SVG connector layer */
  #connector-svg {
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
    pointer-events: none;
    z-index: 0;
    overflow: visible;
  }

  /* Tree depth columns */
  .tree-inner {
    display: flex;
    align-items: flex-start;
    gap: 0;
    min-height: 100%;
    position: relative;
    z-index: 1;
    padding: 10px 0 40px;
  }

  .depth-col {
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: flex-start;
    gap: 12px;
    padding: 0 14px;
    min-width: 160px;
    flex-shrink: 0;
  }
  .depth-col:first-child { padding-left: 4px; }

  /* ── NODES ── */
  .node {
    position: relative;
    background: linear-gradient(135deg, var(--walnut-light) 0%, var(--walnut-mid) 100%);
    border: 1px solid var(--border-node);
    border-radius: var(--r);
    padding: 9px 16px;
    cursor: pointer;
    transition: all 0.18s ease;
    box-shadow: var(--shadow-node);
    user-select: none;
    min-width: 150px;
    max-width: 180px;
  }
  .node:hover {
    border-color: var(--border-hover);
    background: linear-gradient(135deg, var(--walnut-grain) 0%, var(--walnut-light) 100%);
    transform: translateY(-1px);
    box-shadow: 0 4px 16px rgba(0,0,0,0.5);
  }
  .node.selected {
    border-color: var(--sage);
    box-shadow: var(--shadow-active);
    background: linear-gradient(135deg, #2a3d1a 0%, #1e2e12 100%);
  }
  .node.indirect-active {
    border-color: var(--amber);
    border-style: dashed;
    box-shadow: var(--shadow-indirect);
  }
  .node.root-node {
    background: linear-gradient(135deg, #3a2010 0%, #2c1a0e 100%);
    border-color: rgba(240,230,200,0.28);
    min-width: 160px;
  }

  .node-label {
    font-family: 'DM Sans', sans-serif;
    font-size: 15px;
    font-weight: 400;
    color: var(--cream);
    line-height: 1.3;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .node.selected .node-label { color: #d4f0a0; }
  .node.root-node .node-label { font-weight: 500; }

  .node-axis {
    font-family: 'DM Sans', sans-serif;
    font-size: 12px;
    font-weight: 300;
    color: rgba(240,230,200,0.38);
    margin-top: 2px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .node.selected .node-axis { color: rgba(212,240,160,0.5); }

  .node-badge {
    position: absolute;
    top: -6px; right: -6px;
    background: var(--walnut-grain);
    border: 1px solid rgba(240,230,200,0.25);
    border-radius: 8px;
    font-size: 11px;
    font-weight: 500;
    color: var(--cream-dim);
    padding: 1px 5px;
    font-family: 'DM Mono', monospace;
  }

  /* Expand button */
  .expand-btn {
    display: inline-flex;
    align-items: center;
    gap: 3px;
    margin-top: 4px;
    font-size: 12px;
    color: rgba(240,230,200,0.3);
    cursor: pointer;
    transition: color 0.15s;
    font-family: 'DM Mono', monospace;
  }
  .expand-btn:hover { color: var(--cream-dim); }

  /* ── AXIS SELECTOR ── */
  .axis-picker {
    position: absolute;
    background: var(--walnut-mid);
    border: 1px solid rgba(240,230,200,0.2);
    border-radius: 12px;
    padding: 10px;
    z-index: 100;
    box-shadow: 0 8px 32px rgba(0,0,0,0.6);
    min-width: 200px;
    display: none;
  }
  .axis-picker.visible { display: block; }
  .axis-picker-title {
    font-size: 12px;
    font-weight: 500;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: rgba(240,230,200,0.4);
    margin-bottom: 8px;
    font-family: 'DM Sans', sans-serif;
  }
  .axis-option {
    padding: 8px 10px;
    border-radius: 8px;
    font-size: 14px;
    cursor: pointer;
    color: var(--cream-dim);
    font-family: 'DM Sans', sans-serif;
    transition: background 0.12s;
    display: flex; align-items: center; justify-content: space-between;
  }
  .axis-option:hover {
    background: rgba(240,230,200,0.08);
    color: var(--cream);
  }
  .axis-option .ao-sub {
    font-size: 12px;
    color: rgba(240,230,200,0.3);
    font-family: 'DM Mono', monospace;
  }

  /* ── PREVIEW PANEL ── */
  .preview-panel {
    width: 290px;
    flex-shrink: 0;
    border-left: 1px solid rgba(240,230,200,0.08);
    background: rgba(26,15,8,0.6);
    backdrop-filter: blur(8px);
    display: flex;
    flex-direction: column;
    transition: width 0.25s ease, opacity 0.2s;
    overflow: hidden;
  }
  .preview-panel.hidden {
    width: 0;
    opacity: 0;
    border-left: none;
  }

  .preview-header {
    padding: 14px 16px 10px;
    border-bottom: 1px solid rgba(240,230,200,0.08);
    flex-shrink: 0;
  }
  .preview-title {
    font-family: 'Fraunces', serif;
    font-size: 18px;
    font-weight: 600;
    color: var(--cream);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .preview-axis-tag {
    font-size: 12px;
    color: var(--cream-dim);
    font-family: 'DM Mono', monospace;
    margin-top: 2px;
    opacity: 0.6;
  }

  .preview-img-area {
    margin: 12px 14px 0;
    height: 150px;
    background: rgba(240,230,200,0.04);
    border: 1px solid rgba(240,230,200,0.1);
    border-radius: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    flex-shrink: 0;
    position: relative;
  }
  .preview-img-area img {
    width: 100%; height: 100%;
    object-fit: cover;
    border-radius: 10px;
  }
  .preview-img-placeholder {
    font-size: 13px;
    color: rgba(240,230,200,0.2);
    font-family: 'DM Sans', sans-serif;
    text-align: center;
    padding: 12px;
    line-height: 1.5;
  }
  .preview-gen-btn {
    position: absolute;
    bottom: 8px; right: 8px;
    font-size: 12px;
    padding: 5px 11px;
    border-radius: 6px;
    background: rgba(122,170,56,0.2);
    border: 1px solid var(--leaf-dim);
    color: #c8e882;
    cursor: pointer;
    font-family: 'DM Sans', sans-serif;
    transition: all 0.15s;
  }
  .preview-gen-btn:hover { background: rgba(122,170,56,0.32); }

  .preview-prompt-area {
    flex: 1;
    padding: 10px 14px 0;
    overflow: hidden;
    min-height: 0;
  }
  .preview-prompt-label {
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: rgba(240,230,200,0.3);
    margin-bottom: 6px;
    font-family: 'DM Sans', sans-serif;
  }
  .preview-prompt-text {
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    color: rgba(240,230,200,0.55);
    line-height: 1.6;
    overflow: hidden;
    display: -webkit-box;
    -webkit-line-clamp: 7;
    -webkit-box-orient: vertical;
  }

  .preview-actions {
    padding: 10px 14px 14px;
    display: flex;
    gap: 6px;
    flex-shrink: 0;
    border-top: 1px solid rgba(240,230,200,0.06);
    margin-top: 10px;
  }
  .prev-btn {
    flex: 1;
    padding: 8px 0;
    font-size: 13px;
    font-family: 'DM Sans', sans-serif;
    font-weight: 400;
    background: rgba(240,230,200,0.05);
    border: 1px solid rgba(240,230,200,0.14);
    border-radius: 8px;
    color: var(--cream-dim);
    cursor: pointer;
    text-align: center;
    transition: all 0.15s;
  }
  .prev-btn:hover {
    background: rgba(240,230,200,0.1);
    color: var(--cream);
  }
  .prev-btn.success {
    color: #c8e882;
    border-color: var(--leaf-dim);
    background: rgba(122,170,56,0.12);
  }

  /* ── GENERATING STATE ── */
  .generating-indicator {
    display: none;
    align-items: center;
    gap: 6px;
    padding: 6px 14px;
    font-size: 13px;
    color: var(--cream-dim);
    font-family: 'DM Mono', monospace;
  }
  .generating-indicator.visible { display: flex; }
  .gen-dot {
    width: 5px; height: 5px;
    border-radius: 50%;
    background: var(--leaf);
    animation: pulse 1.2s ease-in-out infinite;
  }
  .gen-dot:nth-child(2) { animation-delay: 0.2s; }
  .gen-dot:nth-child(3) { animation-delay: 0.4s; }
  @keyframes pulse {
    0%, 80%, 100% { opacity: 0.2; transform: scale(0.8); }
    40% { opacity: 1; transform: scale(1); }
  }

  /* ── EMPTY STATE ── */
  .empty-state {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    pointer-events: none;
    gap: 8px;
    opacity: 0.3;
  }
  .empty-state-icon { font-size: 28px; }
  .empty-state-text {
    font-family: 'Fraunces', serif;
    font-size: 16px;
    font-style: italic;
    color: var(--cream-dim);
  }

  /* scrollbar */
  .tree-scroll::-webkit-scrollbar { width: 4px; height: 4px; }
  .tree-scroll::-webkit-scrollbar-track { background: transparent; }
  .tree-scroll::-webkit-scrollbar-thumb { background: rgba(240,230,200,0.12); border-radius: 2px; }

  /* fade-in for new nodes */
  @keyframes nodeIn {
    from { opacity: 0; transform: translateX(-8px) scale(0.96); }
    to   { opacity: 1; transform: translateX(0) scale(1); }
  }
  .node-new { animation: nodeIn 0.22s ease forwards; }
</style>
</head>
<body>

<!-- TOP BAR -->
<div class="topbar">
  <div class="breadcrumb" id="breadcrumb">
    <span class="bc-item active" data-id="root">Prompt Lab Workspace</span>
  </div>
  <div class="topbar-actions">
    <div class="generating-indicator" id="gen-indicator">
      <div class="gen-dot"></div>
      <div class="gen-dot"></div>
      <div class="gen-dot"></div>
      <span id="gen-label">Generating…</span>
    </div>
    <details class="settings-pop" id="settings-pop">
      <summary class="tb-btn">API Settings</summary>
      <div class="settings-panel">
        <div class="settings-grid">
          <label class="settings-field">
            <span>Provider</span>
            <select id="provider-input">
              <option value="openai">OpenAI</option>
              <option value="gemini">Gemini</option>
              <option value="anthropic">Anthropic</option>
            </select>
          </label>
          <label class="settings-field">
            <span id="api-key-label">API Key</span>
            <input type="password" id="api-key-input" placeholder="sk-..." autocomplete="off">
          </label>
          <label class="settings-field">
            <span>Text Model</span>
            <input type="text" id="text-model-input" placeholder="gpt-4.1-mini">
          </label>
          <label class="settings-field">
            <span>Image Model</span>
            <input type="text" id="image-model-input" placeholder="gpt-image-1">
          </label>
        </div>
        <div class="settings-note">
          Stored only in this browser via localStorage. Suitable for a local prototype, not a public production page.
        </div>
        <div class="settings-actions">
          <button class="tb-btn primary" type="button" onclick="saveSettings()">Save</button>
          <button class="tb-btn" type="button" onclick="clearSettings()">Clear Key</button>
        </div>
        <div class="settings-meta" id="settings-meta">No API key saved</div>
      </div>
    </details>
    <button class="tb-btn" type="button" onclick="triggerImportTree()">Import tree</button>
    <button class="tb-btn" type="button" onclick="exportTree()">Export tree</button>

<script>
(() => {
  const DEFAULT_PROVIDER = 'openai';

  function loadSettings(storageKey, defaults) {
    try {
      const raw = localStorage.getItem(storageKey);
      return raw ? { provider: DEFAULT_PROVIDER, ...defaults, ...JSON.parse(raw) } : { provider: DEFAULT_PROVIDER, ...defaults };
    } catch {
      return { provider: DEFAULT_PROVIDER, ...defaults };
    }
  }

  function saveSettings(storageKey, settings) {
    localStorage.setItem(storageKey, JSON.stringify(settings));
  }

  function clearSettings(storageKey) {
    localStorage.removeItem(storageKey);
  }

  function extractError(data, fallback) {
    return data?.error?.message || data?.promptFeedback?.blockReason || fallback || 'Request failed';
  }

  function extractText(data) {
    if (typeof data?.output_text === 'string' && data.output_text.trim()) {
      return data.output_text.trim();
    }

    const outputs = Array.isArray(data?.output) ? data.output : [];
    const chunks = [];
    outputs.forEach((item) => {
      const content = Array.isArray(item?.content) ? item.content : [];
      content.forEach((part) => {
        if (typeof part?.text === 'string') chunks.push(part.text);
        if (typeof part?.output_text === 'string') chunks.push(part.output_text);
      });
    });
    return chunks.join('\n').trim();
  }

  function extractGeminiText(data) {
    const candidates = Array.isArray(data?.candidates) ? data.candidates : [];
    const chunks = [];
    candidates.forEach((candidate) => {
      const parts = Array.isArray(candidate?.content?.parts) ? candidate.content.parts : [];
      parts.forEach((part) => {
        if (typeof part?.text === 'string') chunks.push(part.text);
      });
    });
    return chunks.join('\n').trim();
  }

  function extractGeminiImage(data) {
    const candidates = Array.isArray(data?.candidates) ? data.candidates : [];
    for (const candidate of candidates) {
      const parts = Array.isArray(candidate?.content?.parts) ? candidate.content.parts : [];
      for (const part of parts) {
        const inlineData = part?.inlineData || part?.inline_data;
        const mimeType = inlineData?.mimeType || inlineData?.mime_type || 'image/png';
        const payload = inlineData?.data;
        if (payload) {
          return { mimeType, data: payload };
        }
      }
    }
    return null;
  }

  async function requestOpenAIText({ apiKey, model, systemPrompt, userPrompt, maxOutputTokens = 300, text }) {
    const response = await fetch('https://api.openai.com/v1/responses', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        Authorization: `Bearer ${apiKey}`,
      },
      body: JSON.stringify({
        model,
        max_output_tokens: maxOutputTokens,
        input: [
          {
            role: 'system',
            content: [{ type: 'input_text', text: systemPrompt }],
          },
          {
            role: 'user',
            content: [{ type: 'input_text', text: userPrompt }],
          },
        ],
        ...(text ? { text } : {}),
      }),
    });

    const data = await response.json();
    if (!response.ok) {
      throw new Error(extractError(data, response.statusText));
    }

    const output = extractText(data);
    if (!output) {
      throw new Error('Empty response from model');
    }

    return { data, text: output };
  }

  async function requestGeminiText({ apiKey, model, systemPrompt, userPrompt, text }) {
    const wantsJson = text?.format?.type === 'json_schema';
    const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/${encodeURIComponent(model)}:generateContent?key=${encodeURIComponent(apiKey)}`, {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
      },
      body: JSON.stringify({
        systemInstruction: {
          parts: [{ text: systemPrompt }],
        },
        contents: [
          {
            role: 'user',
            parts: [{ text: userPrompt }],
          },
        ],
        ...(wantsJson
          ? {
              generationConfig: {
                responseMimeType: 'application/json',
              },
            }
          : {}),
      }),
    });

    const data = await response.json();
    if (!response.ok) {
      throw new Error(extractError(data, response.statusText));
    }

    const output = extractGeminiText(data);
    if (!output) {
      throw new Error('Empty response from model');
    }

    return { data, text: output };
  }

  async function requestAnthropicText({ apiKey, model, systemPrompt, userPrompt, maxOutputTokens = 300 }) {
    const response = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'anthropic-version': '2023-06-01',
        'anthropic-dangerous-direct-browser-access': 'true',
        'x-api-key': apiKey,
      },
      body: JSON.stringify({
        model,
        max_tokens: maxOutputTokens,
        system: systemPrompt,
        messages: [{ role: 'user', content: userPrompt }],
      }),
    });

    const data = await response.json();
    if (!response.ok) {
      throw new Error(extractError(data, response.statusText || 'Anthropic request failed'));
    }

    const output = (data?.content || [])
      .filter((block) => block.type === 'text')
      .map((block) => block.text)
      .join('\n')
      .trim();

    if (!output) {
      throw new Error('Empty response from model');
    }

    return { data, text: output };
  }

  async function requestText({ provider = DEFAULT_PROVIDER, apiKey, model, systemPrompt, userPrompt, maxOutputTokens = 300, text }) {
    if (provider === 'anthropic') {
      return requestAnthropicText({ apiKey, model, systemPrompt, userPrompt, maxOutputTokens });
    }
    if (provider === 'gemini') {
      return requestGeminiText({ apiKey, model, systemPrompt, userPrompt, text });
    }
    return requestOpenAIText({ apiKey, model, systemPrompt, userPrompt, maxOutputTokens, text });
  }

  async function generateOpenAIImage({ apiKey, model, prompt, size = '1024x1024' }) {
    const response = await fetch('https://api.openai.com/v1/images/generations', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        Authorization: `Bearer ${apiKey}`,
      },
      body: JSON.stringify({
        model,
        prompt,
        size,
        response_format: 'b64_json',
      }),
    });

    const data = await response.json();
    if (!response.ok) {
      throw new Error(extractError(data, response.statusText));
    }

    const imageData = data?.data?.[0]?.b64_json;
    if (!imageData) {
      throw new Error('No image returned by model');
    }

    return { data, dataUrl: `data:image/png;base64,${imageData}` };
  }

  async function generateGeminiImage({ apiKey, model, prompt }) {
    const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/${encodeURIComponent(model)}:generateContent?key=${encodeURIComponent(apiKey)}`, {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
      },
      body: JSON.stringify({
        contents: [
          {
            role: 'user',
            parts: [{ text: prompt }],
          },
        ],
        generationConfig: {
          responseModalities: ['IMAGE'],
          imageConfig: {
            aspectRatio: '1:1',
          },
        },
      }),
    });

    const data = await response.json();
    if (!response.ok) {
      throw new Error(extractError(data, response.statusText));
    }

    const imageData = extractGeminiImage(data);
    if (!imageData?.data) {
      throw new Error('No image returned by model');
    }

    return { data, dataUrl: `data:${imageData.mimeType || 'image/png'};base64,${imageData.data}` };
  }

  async function generateImage({ provider = DEFAULT_PROVIDER, apiKey, model, prompt, size = '1024x1024' }) {
    if (provider === 'gemini') {
      return generateGeminiImage({ apiKey, model, prompt, size });
    }
    return generateOpenAIImage({ apiKey, model, prompt, size });
  }

  window.LocalOpenAIPrototype = {
    DEFAULT_PROVIDER,
    loadSettings,
    saveSettings,
    clearSettings,
    extractError,
    extractText,
    extractGeminiText,
    requestText,
    generateImage,
  };
})();
</script>
<script>
// ── CONSTANTS ──────────────────────────────────────────
const AXES = [
  { id:'art-style',    label:'Art style',     sub:'illustrated / photo / painterly / pixel',      variants:['Illustrated style','Photorealistic','Painterly loose','Pixel-adjacent'] },
  { id:'lighting',     label:'Lighting',      sub:'overcast / golden hr / midday / moody',         variants:['Moody overcast','Golden hour','Bright midday','Candlelit dusk'] },
  { id:'season',       label:'Season state',  sub:'bare / seedling / peak / harvest',              variants:['Bare soil setup','Seedling stage','Peak growth','Harvest ready'] },
  { id:'wetness',      label:'Wetness',       sub:'dry / damp / rain-soaked',                      variants:['Dry summer','Post-rain damp','Rain-soaked','Morning dew'] },
  { id:'camera',       label:'Camera angle',  sub:'isometric / top-down / 3/4',                    variants:['Isometric 3/4','Strict top-down','Low 3/4 angle','Overhead flat'] },
  { id:'detail',       label:'Detail level',  sub:'minimal / standard / high detail',              variants:['Minimal clean','Standard detail','High detail rich','Ultra detailed'] },
  { id:'negative',     label:'Negative space',sub:'isolated / with context / full scene',          variants:['Isolated asset','With gravel context','Garden scene','Full backyard'] },
  { id:'grid',         label:'Grid fidelity', sub:'abstract / 4×6 / 4×8 / labeled',               variants:['Abstract grid','4×6 grid','4×8 grid (32 cells)','Labeled cells'] },
];

const ROOT_PROMPT = `Stylized 3D isometric raised garden bed, premium mobile game asset, cedar wood frame, dark rich soil, 32 planting cells (4 columns × 8 rows exactly), matte black square corner hardware brackets at all 4 corners, white pea gravel pad with organic irregular border, transparent PNG background, isolated asset.`;

// ── STATE ──────────────────────────────────────────────
let nodes = {
  root: {
    id: 'root', label: 'Prompt Lab Workspace', axis: '', depth: 0, parentId: null,
    prompt: ROOT_PROMPT,
    children: [], expanded: true, imageURL: null,
  }
};
let selectedId = null;
let indirectMode = false;
let axisPendingNodeId = null;
let nodeIdCounter = 1;
const SETTINGS_KEY = 'prompt-explorer.openai.settings.v1';
const TREE_STORAGE_KEY = 'prompt-explorer.tree.v2';
const SAVED_NODE_KEY = 'prompt-explorer.saved.v1';
const DEFAULT_SETTINGS = {
  provider: 'openai',
  apiKey: '',
  textModel: 'gpt-4.1-mini',
  imageModel: 'gpt-image-1',
};
let settings = LocalOpenAIPrototype.loadSettings(SETTINGS_KEY, DEFAULT_SETTINGS);
let savedNodes = loadSavedNodes();
const PROVIDER_DEFAULTS = {
  openai: {
    textModel: 'gpt-4.1-mini',
    imageModel: 'gpt-image-1',
    apiKeyPlaceholder: 'sk-...',
  },
  gemini: {
    textModel: 'gemini-2.5-flash',
    imageModel: 'gemini-2.5-flash-image',
    apiKeyPlaceholder: 'AIza...',
  },
  anthropic: {
    textModel: 'claude-sonnet-4-20250514',
    imageModel: '',
    apiKeyPlaceholder: 'sk-ant-...',
  },
};

function syncSettingsUI() {
  document.getElementById('provider-input').value = settings.provider || DEFAULT_SETTINGS.provider;
  document.getElementById('api-key-input').value = settings.apiKey || '';
  const provider = settings.provider || DEFAULT_SETTINGS.provider;
  document.getElementById('text-model-input').value = settings.textModel || PROVIDER_DEFAULTS[provider].textModel;
  document.getElementById('image-model-input').value = settings.imageModel || PROVIDER_DEFAULTS[provider].imageModel;
  updateProviderLabels();
  updateSettingsMeta();
}

function updateSettingsMeta() {
  const provider = settings.provider || DEFAULT_SETTINGS.provider;
  const keyState = settings.apiKey ? 'API key saved' : 'No API key saved';
  const textModel = settings.textModel || PROVIDER_DEFAULTS[provider].textModel;
  const imageModel = settings.imageModel || PROVIDER_DEFAULTS[provider].imageModel;
  document.getElementById('settings-meta').textContent = `${provider} · ${keyState} · ${textModel} · ${imageModel}`;
}

function updateProviderLabels() {
  const provider = document.getElementById('provider-input').value || DEFAULT_SETTINGS.provider;
  const keyLabels = { openai: 'OpenAI API Key', gemini: 'Gemini API Key', anthropic: 'Anthropic API Key' };
  document.getElementById('api-key-label').textContent = keyLabels[provider] || 'API Key';
  document.getElementById('api-key-input').placeholder = PROVIDER_DEFAULTS[provider].apiKeyPlaceholder;
  if (!document.getElementById('text-model-input').value.trim()) {
    document.getElementById('text-model-input').value = PROVIDER_DEFAULTS[provider].textModel;
  }
  if (!document.getElementById('image-model-input').value.trim()) {
    document.getElementById('image-model-input').value = PROVIDER_DEFAULTS[provider].imageModel;
  }
}

function saveSettings() {
  const provider = document.getElementById('provider-input').value || DEFAULT_SETTINGS.provider;
  settings = {
    provider,
    apiKey: document.getElementById('api-key-input').value.trim(),
    textModel: document.getElementById('text-model-input').value.trim() || PROVIDER_DEFAULTS[provider].textModel,
    imageModel: document.getElementById('image-model-input').value.trim() || PROVIDER_DEFAULTS[provider].imageModel,
  };
  LocalOpenAIPrototype.saveSettings(SETTINGS_KEY, settings);
  updateSettingsMeta();
}

function clearSettings() {
  settings = { ...DEFAULT_SETTINGS };
  LocalOpenAIPrototype.clearSettings(SETTINGS_KEY);
  syncSettingsUI();
}

function loadSavedNodes() {
  try {
    const raw = localStorage.getItem(SAVED_NODE_KEY);
    return raw ? JSON.parse(raw) : [];
  } catch {
    return [];
  }
}

function persistSavedNodes() {
  localStorage.setItem(SAVED_NODE_KEY, JSON.stringify(savedNodes));
}

function serializeTreeForStorage() {
  const serialNodes = {};
  Object.entries(nodes).forEach(([id, node]) => {
    serialNodes[id] = {
      ...node,
      imageURL: null,
    };
  });
  return {
    nodes: serialNodes,
    selectedId,
    nodeIdCounter,
    savedAt: Date.now(),
  };
}

function persistTreeState() {
  localStorage.setItem(TREE_STORAGE_KEY, JSON.stringify(serializeTreeForStorage()));
}

function restoreTreeState() {
  try {
    const raw = localStorage.getItem(TREE_STORAGE_KEY);
    if (!raw) return;
    const parsed = JSON.parse(raw);
    if (!parsed?.nodes?.root) return;
    nodes = parsed.nodes;
    selectedId = parsed.selectedId || null;
    nodeIdCounter = Math.max(1, Number(parsed.nodeIdCounter) || 1);
  } catch (e) {
    console.error('Failed to restore explorer tree:', e);
  }
}

// ── TREE RENDER ────────────────────────────────────────
function getDepthMap() {
  const map = {};
  function walk(id, depth) {
    if (!map[depth]) map[depth] = [];
    map[depth].push(id);
    const node = nodes[id];
    if (node.expanded && node.children) node.children.forEach(c => walk(c, depth+1));
  }
  walk('root', 0);
  return map;
}

function renderTree() {
  const inner = document.getElementById('tree-inner');
  inner.innerHTML = '';
  const depthMap = getDepthMap();
  const maxDepth = Math.max(...Object.keys(depthMap).map(Number));
  const nodeEls = {};

  for (let d = 0; d <= maxDepth; d++) {
    const col = document.createElement('div');
    col.className = 'depth-col';
    col.dataset.depth = d;
    (depthMap[d] || []).forEach(id => {
      const el = makeNodeEl(id);
      nodeEls[id] = el;
      col.appendChild(el);
    });
    inner.appendChild(col);
  }

  requestAnimationFrame(() => drawConnectors(nodeEls));
  persistTreeState();
}

function makeNodeEl(id) {
  const node = nodes[id];
  const wrap = document.createElement('div');
  wrap.dataset.nodeId = id;

  const el = document.createElement('div');
  el.className = 'node' +
    (id === 'root' ? ' root-node' : '') +
    (id === selectedId ? ' selected' : '') +
    (indirectMode && id !== selectedId && node.children?.length ? ' indirect-active' : '');

  const labelDiv = document.createElement('div');
  labelDiv.className = 'node-label';
  labelDiv.textContent = node.label;
  el.appendChild(labelDiv);
  if (node.axis) {
    const axisDiv = document.createElement('div');
    axisDiv.className = 'node-axis';
    axisDiv.textContent = node.axis;
    el.appendChild(axisDiv);
  }

  // Collapsed badge
  if (!node.expanded && node.children?.length) {
    const badge = document.createElement('div');
    badge.className = 'node-badge';
    badge.textContent = '+' + node.children.length;
    el.appendChild(badge);
  }

  // Expand/collapse
  if (node.children?.length || node.depth < 3) {
    const expBtn = document.createElement('div');
    expBtn.className = 'expand-btn';
    if (node.children?.length) {
      expBtn.textContent = node.expanded ? '− collapse' : '+ expand';
      expBtn.onclick = (e) => { e.stopPropagation(); toggleExpand(id); };
    } else {
      expBtn.textContent = '+ branch';
      expBtn.onclick = (e) => { e.stopPropagation(); showAxisPicker(id, el); };
    }
    el.appendChild(expBtn);
  }

  el.onclick = () => selectNode(id);
  wrap.appendChild(el);
  return wrap;
}

function drawConnectors(nodeEls) {
  const svg = document.getElementById('connector-svg');
  svg.innerHTML = '';
  const scroll = document.getElementById('tree-scroll');
  const scrollRect = scroll.getBoundingClientRect();

  function getCenter(id) {
    const wrap = nodeEls[id];
    if (!wrap) return null;
    const el = wrap.querySelector('.node');
    if (!el) return null;
    const r = el.getBoundingClientRect();
    return {
      x: r.left - scrollRect.left + scroll.scrollLeft + r.width / 2,
      y: r.top - scrollRect.top + scroll.scrollTop + r.height / 2,
      right: r.left - scrollRect.left + scroll.scrollLeft + r.width,
      left: r.left - scrollRect.left + scroll.scrollLeft,
    };
  }

  function drawCurve(parentId, childId) {
    const p = getCenter(parentId);
    const c = getCenter(childId);
    if (!p || !c) return;
    const x1 = p.right - 4;
    const y1 = p.y;
    const x2 = c.left + 4;
    const y2 = c.y;
    const mx = (x1 + x2) / 2;
    const path = document.createElementNS('http://www.w3.org/2000/svg','path');
    path.setAttribute('d', `M${x1},${y1} C${mx},${y1} ${mx},${y2} ${x2},${y2}`);
    path.setAttribute('fill', 'none');
    path.setAttribute('stroke', 'rgba(240,230,200,0.28)');
    path.setAttribute('stroke-width', '1.2');
    path.setAttribute('stroke-linecap', 'round');
    svg.appendChild(path);
  }

  function walkConnectors(id) {
    const node = nodes[id];
    if (!node.expanded || !node.children) return;
    node.children.forEach(cid => {
      drawCurve(id, cid);
      walkConnectors(cid);
    });
  }
  walkConnectors('root');
}

// ── NODE ACTIONS ───────────────────────────────────────
function selectNode(id) {
  selectedId = id;
  updateBreadcrumb();
  updatePreview();
  renderTree();
}

function toggleExpand(id) {
  nodes[id].expanded = !nodes[id].expanded;
  renderTree();
}

function toggleIndirectMode() {
  indirectMode = !indirectMode;
  const btn = document.getElementById('indirect-btn');
  btn.classList.toggle('active-btn', indirectMode);
  btn.textContent = indirectMode ? '✕ Exit indirect' : '⤢ Branch indirectly';
  renderTree();
}

// ── AXIS PICKER ────────────────────────────────────────
function showAxisPicker(nodeId, anchorEl) {
  axisPendingNodeId = nodeId;
  const picker = document.getElementById('axis-picker');
  const opts = document.getElementById('axis-options');
  opts.innerHTML = '';

  AXES.forEach(ax => {
    const opt = document.createElement('div');
    opt.className = 'axis-option';
    const labelSpan = document.createElement('span');
    labelSpan.textContent = ax.label;
    const subSpan = document.createElement('span');
    subSpan.className = 'ao-sub';
    subSpan.textContent = ax.sub.split('/')[0].trim() + '…';
    opt.append(labelSpan, subSpan);
    opt.onclick = () => { picker.classList.remove('visible'); expandByAxis(nodeId, ax); };
    opts.appendChild(opt);
  });

  const rect = anchorEl.getBoundingClientRect();
  const mainRect = document.querySelector('.main').getBoundingClientRect();
  picker.style.top = (rect.bottom - mainRect.top + 6) + 'px';
  picker.style.left = (rect.left - mainRect.left) + 'px';
  picker.classList.add('visible');
}

document.addEventListener('click', (e) => {
  if (!e.target.closest('.axis-picker') && !e.target.closest('.expand-btn')) {
    document.getElementById('axis-picker').classList.remove('visible');
  }
  if (!e.target.closest('.settings-pop')) {
    document.getElementById('settings-pop').open = false;
  }
});

document.getElementById('import-tree-input').addEventListener('change', importTreeFromFile);
document.getElementById('provider-input').addEventListener('change', () => {
  document.getElementById('text-model-input').value = '';
  document.getElementById('image-model-input').value = '';
  updateProviderLabels();
});

// ── GENERATE CHILDREN ──────────────────────────────────
async function expandByAxis(nodeId, axis) {
  const parentNode = nodes[nodeId];
  showGenerating(`Branching by ${axis.label}…`);

  try {
    const children = await generateChildren(parentNode, axis);
    children.forEach(child => {
      const id = 'n' + (nodeIdCounter++);
      nodes[id] = {
        id, label: child.label, axis: axis.label,
        depth: parentNode.depth + 1,
        parentId: nodeId,
        prompt: child.prompt,
        children: [], expanded: false, imageURL: null,
      };
      parentNode.children.push(id);
    });
    parentNode.expanded = true;
    hideGenerating();
    renderTree();
    // Select first child
    if (parentNode.children.length) selectNode(parentNode.children[parentNode.children.length - children.length]);
  } catch(e) {
    hideGenerating();
    console.error(e);
    // Fallback to static variants
    axis.variants.forEach(v => {
      const id = 'n' + (nodeIdCounter++);
      nodes[id] = {
        id, label: v, axis: axis.label,
        depth: parentNode.depth + 1, parentId: nodeId,
        prompt: buildFallbackPrompt(parentNode.prompt, axis, v),
        children: [], expanded: false, imageURL: null,
      };
      parentNode.children.push(id);
    });
    parentNode.expanded = true;
    renderTree();
    if (parentNode.children.length) selectNode(parentNode.children[0]);
  }
}

async function generateChildren(parentNode, axis) {
  const systemPrompt = `You are a prompt engineering assistant for a visual prompt exploration tool called Prompt Explorer, used in Prompt Lab.

Your job: given a parent imagegen prompt and a branching axis, generate exactly 4 child prompt variants. Each child should vary ONLY along the specified axis while preserving all other details from the parent prompt.

Respond with ONLY valid JSON and no markdown:
{"children":[{"label":"short label","prompt":"full prompt"}]}

Rules:
- Labels must be 2-3 words, specific and distinct
- Prompts must be complete, self-contained imagegen prompts
- Always preserve: cedar frame, isometric view, transparent PNG, game art style (unless art-style axis)
- Always preserve: black corner hardware, pea gravel pad (unless explicitly changing these)
- Never add people or text to the image
- Keep prompts under 120 words`;

  const userMsg = `Parent prompt: "${parentNode.prompt}"

Branch axis: ${axis.label}
Axis description: ${axis.sub}

Generate 4 child variants along the "${axis.label}" axis.`;

  if (!settings.apiKey) {
    document.getElementById('settings-pop').open = true;
    throw new Error(`Add a ${settings.provider === 'gemini' ? 'Gemini' : 'OpenAI'} API key in API Settings first.`);
  }

  const { text } = await LocalOpenAIPrototype.requestText({
    provider: settings.provider || DEFAULT_SETTINGS.provider,
    apiKey: settings.apiKey,
    model: settings.textModel || PROVIDER_DEFAULTS[settings.provider || DEFAULT_SETTINGS.provider].textModel,
    systemPrompt,
    userPrompt: userMsg,
    maxOutputTokens: 900,
    text: {
      format: {
        type: 'json_schema',
        name: 'prompt_children',
        strict: true,
        schema: {
          type: 'object',
          properties: {
            children: {
              type: 'array',
              minItems: 4,
              maxItems: 4,
              items: {
                type: 'object',
                properties: {
                  label: { type: 'string' },
                  prompt: { type: 'string' }
                },
                required: ['label', 'prompt'],
                additionalProperties: false
              }
            }
          },
          required: ['children'],
          additionalProperties: false
        }
      }
    }
  });
  const parsed = JSON.parse(text);
  const children = Array.isArray(parsed?.children) ? parsed.children : [];
  if (children.length !== 4) {
    throw new Error('Model returned an unexpected branch payload');
  }
  return children;
}

function buildFallbackPrompt(parent, axis, variant) {
  return `${parent} Variation: ${variant.toLowerCase()} ${axis.label}.`;
}

// ── BREADCRUMB ─────────────────────────────────────────
function getPath(id) {
  const path = [];
  let cur = nodes[id];
  while (cur) { path.unshift(cur); cur = cur.parentId ? nodes[cur.parentId] : null; }
  return path;
}

function updateBreadcrumb() {
  const bc = document.getElementById('breadcrumb');
  bc.innerHTML = '';
  if (!selectedId) {
    const span = document.createElement('span');
    span.className = 'bc-item active';
    span.textContent = 'Prompt Lab Workspace';
    span.onclick = () => selectNode('root');
    bc.appendChild(span);
    return;
  }
  const path = getPath(selectedId);
  path.forEach((n, i) => {
    const isLast = i === path.length - 1;
    const span = document.createElement('span');
    span.className = 'bc-item' + (isLast ? ' active' : '');
    span.textContent = n.label;
    span.onclick = () => selectNode(n.id);
    bc.appendChild(span);
    if (!isLast) {
      const sep = document.createElement('span');
      sep.className = 'bc-sep';
      sep.textContent = ' › ';
      bc.appendChild(sep);
    }
  });
}

// ── PREVIEW PANEL ──────────────────────────────────────
function updatePreview() {
  const panel = document.getElementById('preview-panel');
  if (!selectedId) { panel.classList.add('hidden'); return; }
  panel.classList.remove('hidden');

  const node = nodes[selectedId];
  document.getElementById('preview-title').textContent = node.label;
  document.getElementById('preview-axis').textContent = node.axis || 'seed prompt';
  document.getElementById('preview-prompt-text').textContent = node.prompt;

  const img = document.getElementById('preview-img');
  const placeholder = document.getElementById('preview-img-placeholder');
  const genBtn = document.getElementById('preview-gen-btn');

  if (node.imageURL) {
    img.src = node.imageURL;
    img.style.display = 'block';
    placeholder.style.display = 'none';
    genBtn.style.display = 'none';
  } else {
    img.style.display = 'none';
    placeholder.style.display = 'flex';
    placeholder.textContent = 'No image generated';
    genBtn.style.display = 'block';
    genBtn.textContent = 'Generate ↗';
  }
}

async function generateForSelected() {
  if (!selectedId) return;
  const node = nodes[selectedId];
  const btn = document.getElementById('preview-gen-btn');
  const placeholder = document.getElementById('preview-img-placeholder');

  if (!settings.apiKey) {
    document.getElementById('settings-pop').open = true;
    placeholder.textContent = `Add a ${settings.provider === 'gemini' ? 'Gemini' : 'OpenAI'} API key in API Settings first`;
    return;
  }

  btn.textContent = 'Generating…';
  btn.style.pointerEvents = 'none';
  showGenerating('Generating image…');

  try {
    const result = await LocalOpenAIPrototype.generateImage({
      provider: settings.provider || DEFAULT_SETTINGS.provider,
      apiKey: settings.apiKey,
      model: settings.imageModel || PROVIDER_DEFAULTS[settings.provider || DEFAULT_SETTINGS.provider].imageModel,
      prompt: node.prompt,
      size: '1024x1024',
    });
    node.imageURL = result.dataUrl;
    updatePreview();
    persistTreeState();
  } catch (e) {
    console.error(e);
    placeholder.textContent = e.message || 'Image generation failed';
  } finally {
    hideGenerating();
    btn.textContent = 'Generate ↗';
    btn.style.pointerEvents = '';
  }
}

// ── COPY / SAVE ────────────────────────────────────────
function copySelected() {
  const id = selectedId || 'root';
  const node = nodes[id];
  if (!node) return;
  navigator.clipboard.writeText(node.prompt).then(() => {
    const btn = document.getElementById('prev-copy-btn');
    btn.textContent = 'Copied!';
    btn.classList.add('success');
    setTimeout(() => { btn.textContent = 'Copy'; btn.classList.remove('success'); }, 1800);
  });
}

function pinSelected() {
  if (!selectedId) return;
  alert('Pin to comparison tray — coming soon');
}

function saveToPromptLab() {
  if (!selectedId) return;
  const node = nodes[selectedId];
  const entry = {
    id: `saved-${Date.now()}`,
    label: node.label,
    axis: node.axis || 'seed prompt',
    prompt: node.prompt,
    imageURL: node.imageURL || null,
    path: getPath(selectedId).map(n => n.label),
    savedAt: Date.now(),
  };
  savedNodes = [entry, ...savedNodes.filter(item => item.prompt !== entry.prompt)].slice(0, 20);
  persistSavedNodes();
  renderSavedLibrary();
  const saveBtn = Array.from(document.querySelectorAll('.prev-btn')).find(btn => btn.textContent === 'Save');
  if (saveBtn) {
    const original = saveBtn.textContent;
    saveBtn.textContent = 'Saved';
    setTimeout(() => { saveBtn.textContent = original; }, 1600);
  }
}

// ── GENERATING INDICATOR ───────────────────────────────
function showGenerating(msg) {
  const ind = document.getElementById('gen-indicator');
  document.getElementById('gen-label').textContent = msg || 'Generating…';
  ind.classList.add('visible');
}
function hideGenerating() {
  document.getElementById('gen-indicator').classList.remove('visible');
}

function renderSavedLibrary() {
  const list = document.getElementById('saved-library-list');
  const meta = document.getElementById('saved-library-meta');
  meta.textContent = `${savedNodes.length} saved`;
  list.innerHTML = '';

  if (!savedNodes.length) {
    list.innerHTML = '<div class="saved-empty">Saved prompt and image variants will appear here. Save a node to keep its prompt, path, and generated image across reloads.</div>';
    return;
  }

  savedNodes.forEach(item => {
    const row = document.createElement('div');
    row.className = 'saved-item';

    const thumb = document.createElement('div');
    thumb.className = 'saved-thumb';
    if (item.imageURL) {
      const img = document.createElement('img');
      img.src = item.imageURL;
      img.alt = '';
      thumb.appendChild(img);
    } else {
      thumb.innerHTML = 'Prompt<br>Only';
    }

    const body = document.createElement('div');
    body.className = 'saved-body';
    const label = document.createElement('div');
    label.className = 'saved-label';
    label.textContent = item.label;
    const sub = document.createElement('div');
    sub.className = 'saved-sub';
    sub.textContent = (item.path || []).join(' › ');
    body.append(label, sub);

    const actions = document.createElement('div');
    actions.className = 'saved-actions';
    const copyBtn = document.createElement('div');
    copyBtn.className = 'prev-btn';
    copyBtn.textContent = 'Copy';
    copyBtn.onclick = () => navigator.clipboard.writeText(item.prompt);
    const loadBtn = document.createElement('div');
    loadBtn.className = 'prev-btn';
    loadBtn.textContent = 'Load';
    loadBtn.onclick = () => loadSavedNode(item.id);
    actions.append(copyBtn, loadBtn);

    row.append(thumb, body, actions);
    list.appendChild(row);
  });
}

function loadSavedNode(id) {
  const item = savedNodes.find(entry => entry.id === id);
  if (!item) return;
  nodes = {
    root: {
      id: 'root',
      label: item.label,
      axis: '',
      depth: 0,
      parentId: null,
      prompt: item.prompt,
      children: [],
      expanded: true,
      imageURL: item.imageURL || null,
    }
  };
  selectedId = 'root';
  nodeIdCounter = 1;
  updatePreview();
  updateBreadcrumb();
  renderTree();
}

function triggerImportTree() {
  document.getElementById('import-tree-input').click();
}

function importTreeFromFile(event) {
  const [file] = event.target.files || [];
  if (!file) return;

  const reader = new FileReader();
  reader.onload = () => {
    try {
      const parsed = JSON.parse(reader.result);
      if (!parsed?.nodes?.root) throw new Error('Invalid tree export');
      nodes = parsed.nodes;
      selectedId = parsed.selectedId || 'root';
      nodeIdCounter = Math.max(1, Number(parsed.nodeIdCounter) || 1);
      renderTree();
      updateBreadcrumb();
      updatePreview();
    } catch (e) {
      console.error(e);
      alert(`Import failed: ${e.message}`);
    } finally {
      event.target.value = '';
    }
  };
  reader.readAsText(file);
}

function exportTree() {
  const payload = {
    version: 1,
    exportedAt: new Date().toISOString(),
    nodes,
    selectedId,
    nodeIdCounter,
  };
  const blob = new Blob([JSON.stringify(payload, null, 2)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const link = document.createElement('a');
  link.href = url;
  link.download = `prompt-explorer-tree-${Date.now()}.json`;
  link.click();
  URL.revokeObjectURL(url);
}

// ── INIT ───────────────────────────────────────────────
restoreTreeState();
if (!selectedId) {
  selectedId = 'root';
}
syncSettingsUI();
renderSavedLibrary();
renderTree();
updateBreadcrumb();
updatePreview();
persistTreeState();
</script>
</body>
</html>
