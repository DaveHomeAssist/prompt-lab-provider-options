<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>PromptLab Mobile</title>
<meta name="viewport" content="width=device-width, initial-scale=1" />
<style>
  html, body { margin: 0; padding: 0; background: oklch(0.96 0.004 280); font-family: -apple-system, system-ui, "Segoe UI", Roboto, sans-serif; color: oklch(0.16 0.012 280); }
  * { box-sizing: border-box; }
</style>
<script>
  // Tweak defaults — host rewrites this JSON in place when the user changes a control.
  window.PL_TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
    "accent": "violet",
    "dark": true,
    "type": "small",
    "cardStyle": "flat"
  }/*EDITMODE-END*/;
</script>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
<div id="root"></div>

<script type="text/babel" src="prompt-labs-mobile/ios-frame.jsx"></script>

<script type="text/babel" src="prompt-labs-mobile/design-canvas.jsx"></script>
<script type="text/babel" src="prompt-labs-mobile/tweaks-panel.jsx"></script>
<script type="text/babel" src="prompt-labs-mobile/styles.jsx"></script>
<script type="text/babel" src="prompt-labs-mobile/screens.jsx"></script>
<script type="text/babel" src="prompt-labs-mobile/app.jsx"></script>

<template id="__bundler_thumbnail" data-bg-color="#1a1428">
  <svg viewBox="0 0 1200 800" xmlns="http://www.w3.org/2000/svg">
    <rect width="1200" height="800" fill="#1a1428"/>
    <!-- two phone silhouettes side by side -->
    <g transform="translate(360 180)">
      <rect width="220" height="440" rx="44" fill="#2a1f42" stroke="#7c5cff" stroke-width="3"/>
      <rect x="20" y="60" width="180" height="28" rx="6" fill="#7c5cff" opacity="0.4"/>
      <rect x="20" y="100" width="120" height="14" rx="4" fill="#7c5cff" opacity="0.25"/>
      <rect x="20" y="140" width="180" height="60" rx="10" fill="#7c5cff" opacity="0.18"/>
      <rect x="20" y="210" width="180" height="60" rx="10" fill="#7c5cff" opacity="0.18"/>
      <rect x="20" y="280" width="180" height="60" rx="10" fill="#7c5cff" opacity="0.18"/>
    </g>
    <g transform="translate(620 180)">
      <rect width="220" height="440" rx="20" fill="#2a1f42" stroke="#7c5cff" stroke-width="3"/>
      <rect x="20" y="60" width="180" height="28" rx="6" fill="#7c5cff" opacity="0.4"/>
      <rect x="20" y="100" width="120" height="14" rx="4" fill="#7c5cff" opacity="0.25"/>
      <rect x="20" y="140" width="180" height="60" rx="10" fill="#7c5cff" opacity="0.18"/>
      <rect x="20" y="210" width="180" height="60" rx="10" fill="#7c5cff" opacity="0.18"/>
      <rect x="20" y="280" width="180" height="60" rx="10" fill="#7c5cff" opacity="0.18"/>
    </g>
    <!-- sparkle -->
    <path d="M600 80 L612 116 L648 128 L612 140 L600 176 L588 140 L552 128 L588 116 Z" fill="#a78bfa"/>
  </svg>
</template>
</body>
</html>
