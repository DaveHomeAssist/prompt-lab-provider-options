/* ── use-library.jsx ────────────────────────────────────────────────────── */
function extractVars(s) {
  if (!s) return [];
  const m = s.match(/\{\{\s*[\w-]+\s*\}\}/g);
  return m || [];
}
function looksSensitive(s) {
  if (!s) return false;
  if (/\b\d{3}-\d{2}-\d{4}\b/.test(s)) return true;
  if (/\b(?:\d[ -]*?){13,19}\b/.test(s)) return true;
  if (/sk-[A-Za-z0-9]{16,}/.test(s)) return true;
  if (/password|api[_-]?key|secret/i.test(s)) return true;
  return false;
}

function usePromptLibrary({ initialLibrary, initialCollections, starterPacks }) {
  const [library, setLibrary] = useState(initialLibrary);
  const [collections, setCollections] = useState(initialCollections);
  const [activeCollection, setActiveCollection] = useState(null);
  const [activeTag, setActiveTag] = useState(null);
  const [search, setSearch] = useState('');
  const [sortBy, setSortBy] = useState('newest');
  const [expandedId, setExpandedId] = useState(null);
  const [renamingId, setRenamingId] = useState(null);
  const [renameValue, setRenameValue] = useState('');
  const [shareId, setShareId] = useState(null);
  const [starterLibraries, setStarterLibraries] = useState(starterPacks);
  const [draggingLibraryId, setDraggingLibraryId] = useState(null);
  const [dragOverLibraryId, setDragOverLibraryId] = useState(null);

  const allLibTags = useMemo(() => {
    const s = new Set();
    library.forEach(e => (e.tags || []).forEach(t => s.add(t)));
    return [...s].sort();
  }, [library]);

  const filtered = useMemo(() => {
    const q = search.trim().toLowerCase();
    let rows = library.filter(e => {
      if (activeCollection && (e.collection || '') !== activeCollection) return false;
      if (activeTag && !(e.tags || []).includes(activeTag)) return false;
      if (q) {
        const hay = `${e.title}\n${e.original || ''}\n${e.enhanced || ''}\n${e.notes || ''}\n${(e.tags || []).join(' ')}`.toLowerCase();
        if (!hay.includes(q)) return false;
      }
      return true;
    });
    const by = sortBy;
    if (by === 'newest') rows.sort((a, b) => b.createdAt - a.createdAt);
    else if (by === 'oldest') rows.sort((a, b) => a.createdAt - b.createdAt);
    else if (by === 'a-z') rows.sort((a, b) => a.title.localeCompare(b.title));
    else if (by === 'z-a') rows.sort((a, b) => b.title.localeCompare(a.title));
    else if (by === 'most-used') rows.sort((a, b) => (b.useCount || 0) - (a.useCount || 0));
    else if (by === 'group') rows.sort((a, b) => (a.collection || 'zzz').localeCompare(b.collection || 'zzz') || (b.createdAt - a.createdAt));
    else if (by === 'manual') {
      const order = new Map(library.map((e, i) => [e.id, i]));
      rows.sort((a, b) => order.get(a.id) - order.get(b.id));
    }
    return rows;
  }, [library, activeCollection, activeTag, search, sortBy]);

  const bumpUse = useCallback(id => setLibrary(L => L.map(e => e.id === id ? { ...e, useCount: (e.useCount || 0) + 1 } : e)), []);
  const del = useCallback(id => setLibrary(L => L.filter(e => e.id !== id)), []);
  const renameEntry = useCallback((id, newTitle) => {
    const title = (newTitle || '').trim();
    if (!title) { setRenamingId(null); setRenameValue(''); return; }
    setLibrary(L => L.map(e => e.id === id ? { ...e, title } : e));
    setRenamingId(null); setRenameValue('');
  }, []);
  const moveLibraryEntry = useCallback((sourceId, targetId, position) => {
    if (!sourceId || sourceId === targetId) return;
    setLibrary(L => {
      const src = L.findIndex(e => e.id === sourceId);
      const tgt = L.findIndex(e => e.id === targetId);
      if (src < 0 || tgt < 0) return L;
      const next = [...L];
      const [moved] = next.splice(src, 1);
      let insertAt = next.findIndex(e => e.id === targetId);
      if (position === 'after') insertAt += 1;
      next.splice(insertAt, 0, moved);
      return next;
    });
  }, []);
  const moveLibraryEntryByOffset = useCallback((id, offset, visible) => {
    setLibrary(L => {
      const visIds = visible.map(e => e.id);
      const pos = visIds.indexOf(id);
      const newPos = pos + offset;
      if (pos < 0 || newPos < 0 || newPos >= visIds.length) return L;
      const srcIdx = L.findIndex(e => e.id === id);
      const destIdx = L.findIndex(e => e.id === visIds[newPos]);
      if (srcIdx < 0 || destIdx < 0) return L;
      const next = [...L];
      const [m] = next.splice(srcIdx, 1);
      next.splice(destIdx, 0, m);
      return next;
    });
  }, []);
  const exportLib = useCallback(() => {
    if (library.length === 0) { window.__toast?.('Library is empty.'); return; }
    const hasSensitive = library.some(e => looksSensitive(e.original) || looksSensitive(e.enhanced) || looksSensitive(e.notes));
    if (hasSensitive && !window.confirm('Some prompts may contain sensitive content (keys, PII). Continue exporting?')) return;
    const blob = new Blob([JSON.stringify({ library, collections }, null, 2)], { type: 'application/json' });
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = 'promptlab-library.json';
    a.click();
    URL.revokeObjectURL(a.href);
    window.__toast?.(`Exported ${library.length} prompts.`);
  }, [library, collections]);
  const loadStarterPack = useCallback(id => {
    const pack = starterLibraries.find(p => p.id === id);
    if (!pack || pack.loaded) return;
    const seeds = Array.from({ length: pack.promptCount }).map((_, i) => ({
      id: `${pack.id}-${i}-${Math.random().toString(36).slice(2, 7)}`,
      title: `${pack.name.replace(' Starter', '')} prompt ${i + 1}`,
      collection: pack.name.replace(' Starter', ''),
      tags: [pack.name.split(' ')[0].toLowerCase()],
      original: `Seed ${i + 1} original.`,
      enhanced: `You are an expert in ${pack.name.split(' ')[0].toLowerCase()}. Help the user with task #${i + 1}. Use {{context}} for context.`,
      notes: '', variants: [], versions: [], useCount: 0,
      createdAt: Date.now() - i * 1000 * 60, metadata: {},
    }));
    setLibrary(L => [...seeds, ...L]);
    setStarterLibraries(p => p.map(s => s.id === id ? { ...s, loaded: true } : s));
    if (!collections.includes(pack.name.replace(' Starter', ''))) {
      setCollections(c => [...c, pack.name.replace(' Starter', '')]);
    }
    window.__toast?.(`Loaded ${pack.promptCount} prompts from ${pack.name}.`);
  }, [starterLibraries, collections]);
  const importPack = useCallback(jsonText => {
    try {
      const data = JSON.parse(jsonText);
      const rows = Array.isArray(data) ? data : (data.library || []);
      if (!Array.isArray(rows) || rows.length === 0) throw new Error('no entries');
      const stamped = rows.map((r, i) => ({
        id: r.id || `imp-${Date.now()}-${i}`,
        title: r.title || 'Imported prompt',
        collection: r.collection || '',
        tags: r.tags || [],
        original: r.original || '',
        enhanced: r.enhanced || '',
        notes: r.notes || '',
        variants: r.variants || [],
        versions: r.versions || [],
        useCount: r.useCount || 0,
        createdAt: r.createdAt || Date.now(),
        metadata: r.metadata || {},
      }));
      setLibrary(L => [...stamped, ...L]);
      window.__toast?.(`Imported ${stamped.length} prompts.`);
      return { ok: true, count: stamped.length };
    } catch (err) {
      window.__toast?.('Import failed — invalid JSON.');
      return { ok: false, error: String(err) };
    }
  }, []);
  const getShareUrl = useCallback(entry => {
    const payload = btoa(unescape(encodeURIComponent(JSON.stringify({ t: entry.title, e: entry.enhanced }))));
    return `https://promptlab.tools/s/#${payload.slice(0, 96)}`;
  }, []);

  return {
    library, collections, activeCollection, setActiveCollection, activeTag, setActiveTag,
    search, setSearch, sortBy, setSortBy,
    expandedId, setExpandedId, renamingId, setRenamingId, renameValue, setRenameValue,
    shareId, setShareId,
    allLibTags, filtered,
    bumpUse, del, renameEntry,
    moveLibraryEntry, moveLibraryEntryByOffset,
    draggingLibraryId, setDraggingLibraryId, dragOverLibraryId, setDragOverLibraryId,
    exportLib, importPack,
    starterLibraries, loadStarterPack,
    getShareUrl,
  };
}

function TagChip({ tag, selected, onClick }) {
  const base = 'ui-control px-2 py-0.5 rounded-full text-[11px] font-medium border transition-colors';
  if (onClick) {
    return (
      <button type="button" onClick={onClick} aria-pressed={!!selected}
        className={`${base} ${selected ? 'bg-violet-600 border-violet-600 text-white' : 'bg-transparent border-gray-700 text-gray-400 hover:border-gray-500 hover:text-gray-200'}`}>
        #{tag}
      </button>
    );
  }
  return <span className={`${base} bg-gray-800 border-gray-700 text-gray-400`}>#{tag}</span>;
}

function DraftBadge({ children, tone = 'warning' }) {
  const cls = tone === 'warning' ? 'bg-amber-950/40 border-amber-900/50 text-amber-400' : 'bg-gray-800 border-gray-700 text-gray-400';
  return <span className={`inline-flex items-center px-1.5 py-[1px] rounded border text-[10px] uppercase tracking-wider font-semibold ${cls}`}>{children}</span>;
}

function MarkdownPreview({ text, className = '' }) {
  if (!text) return <span className="opacity-50">(empty)</span>;
  const esc = (s) => s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
  const html = esc(text)
    .replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>')
    .replace(/`([^`]+)`/g, '<code class="px-1 rounded bg-gray-800 text-violet-300 font-mono text-[0.9em]">$1</code>')
    .replace(/\{\{\s*([\w-]+)\s*\}\}/g, '<span class="text-amber-400 font-mono">{{$1}}</span>')
    .replace(/\n/g, '<br>');
  return <div className={className} dangerouslySetInnerHTML={{ __html: html }} />;
}

function PresetImportPanel({ m, lib, onClose }) {
  const [json, setJson] = useState('');
  const [step, setStep] = useState('idle');
  const [parsed, setParsed] = useState(null);

  const sample = JSON.stringify({
    library: [
      { title: 'Bug triage rubric', collection: 'Engineering', tags: ['triage'],
        enhanced: 'You are a triage lead. Given a bug report, decide: severity, owner area, and whether it needs a repro. Use {{report}}.' },
      { title: 'Weekly standup template', collection: 'Engineering', tags: ['meeting'],
        enhanced: 'Summarize this week\'s work as: **Shipped**, **Blocked**, **Next**. Source: {{log}}.' },
    ]
  }, null, 2);

  const preview = () => {
    try {
      const data = JSON.parse(json || '{}');
      const rows = Array.isArray(data) ? data : (data.library || []);
      if (rows.length === 0) throw new Error('no entries');
      setParsed(rows);
      setStep('preview');
    } catch {
      window.__toast?.('Invalid JSON.');
    }
  };
  const apply = () => {
    const result = lib.importPack(json);
    if (result.ok) { setStep('applied'); setTimeout(() => onClose(), 900); }
  };

  return (
    <div className={`border-b ${m.border} px-3 py-3`}>
      <div className="flex items-center justify-between mb-2">
        <div>
          <p className={`text-sm font-semibold ${m.text}`}>Import preset pack</p>
          <p className={`text-[11px] ${m.textMuted}`}>Paste a library JSON export. Local merge — no network.</p>
        </div>
        <button type="button" onClick={onClose} aria-label="Close import panel"
          className={`ui-control p-1.5 rounded ${m.btn} ${m.textAlt}`}>
          <Ic n="X" size={12} />
        </button>
      </div>
      {step === 'idle' && (
        <>
          <textarea
            value={json} onChange={e => setJson(e.target.value)}
            placeholder={sample}
            rows={6}
            className={`w-full ${m.input} rounded-lg px-2.5 py-2 text-[11px] font-mono leading-snug focus:outline-none focus:border-violet-500 ${m.text}`} />
          <div className="flex gap-2 mt-2">
            <button type="button" onClick={preview}
              className="ui-control px-3 py-1.5 rounded-lg text-xs font-medium bg-violet-600 hover:bg-violet-500 text-white">
              Preview
            </button>
            <button type="button" onClick={() => setJson(sample)}
              className={`ui-control px-3 py-1.5 rounded-lg text-xs font-medium ${m.btn} ${m.textAlt}`}>
              Use sample
            </button>
          </div>
        </>
      )}
      {step === 'preview' && (
        <div>
          <div className={`${m.codeBlock} border ${m.border} rounded-lg p-2.5 max-h-40 overflow-auto`}>
            {parsed.map((r, i) => (
              <div key={i} className="flex items-start gap-2 py-1 text-xs">
                <span className={`${m.textMuted} font-mono w-4`}>{i + 1}</span>
                <div className="flex-1 min-w-0">
                  <p className={`${m.text} font-medium truncate`}>{r.title || 'Untitled'}</p>
                  <p className={`${m.textMuted} truncate`}>{r.collection || 'No collection'} · {(r.tags || []).join(', ') || 'no tags'}</p>
                </div>
              </div>
            ))}
          </div>
          <div className="flex gap-2 mt-2">
            <button type="button" onClick={apply}
              className="ui-control px-3 py-1.5 rounded-lg text-xs font-medium bg-violet-600 hover:bg-violet-500 text-white">
              Import {parsed.length} prompts
            </button>
            <button type="button" onClick={() => setStep('idle')}
              className={`ui-control px-3 py-1.5 rounded-lg text-xs font-medium ${m.btn} ${m.textAlt}`}>
              Back
            </button>
          </div>
        </div>
      )}
      {step === 'applied' && (
        <p className="text-xs text-green-400">Imported ✓</p>
      )}
    </div>
  );
}

              className={`ui-control px-2.5 rounded-lg text-xs ${compact ? 'flex-1 py-1.5' : ''} ${canExportLibrary ? `${m.btn} ${m.textAlt}` : `border ${a.subtle}`}`}>
              {canExportLibrary ? 'Export' : 'Export Pro'}
            </button>
            {isWeb && (
              <button type="button" onClick={() => window.__toast?.('No legacy web library found.')}
                className={`ui-control px-2.5 rounded-lg text-xs ${m.btn} ${m.textAlt} ${compact ? 'flex-1 py-1.5' : ''}`}>
                Recover
              </button>
            )}
            <button type="button" onClick={() => setShowImportPanel(p => !p)} aria-label="Import preset pack"
              className={`ui-control px-2.5 rounded-lg text-xs ${showImportPanel ? a.active : `${m.btn} ${m.textAlt}`} ${compact ? 'flex-1 py-1.5' : ''}`}>
              <span className="flex items-center gap-1"><Ic n="Upload" size={11} />Import Pack</span>
            </button>
          </div>
        </div>
        {d.showToolbarHint && lib.sortBy === 'manual' && (
          <p className={`text-[11px] ${m.textMuted}`}>Manual order is live. Drag cards or use the arrow controls to move them.</p>
        )}
        {canUseCollections && lib.collections.length > 0 && (
          <div className="flex gap-1 flex-wrap">
            <button type="button" onClick={() => lib.setActiveCollection(null)}
              className={`ui-control px-2 py-0.5 rounded-full text-xs font-medium ${!lib.activeCollection ? a.active : `${m.btn} ${m.textAlt}`}`}>All</button>
            {lib.collections.map(c => (
              <button key={c} type="button" onClick={() => lib.setActiveCollection(p => p === c ? null : c)}
                className={`ui-control px-2 py-0.5 rounded-full text-xs font-medium flex items-center gap-1 ${lib.activeCollection === c ? a.active : `${m.btn} ${m.textAlt}`}`}>
                <Ic n="FolderOpen" size={9} />{c}
              </button>
            ))}
          </div>
        )}
        {!canUseCollections && lib.collections.length > 0 && (
          <div className={`rounded-lg border px-3 py-2 text-xs leading-relaxed ${m.codeBlock} ${m.border} ${m.textMuted}`}>
            Collection filters are available on Prompt Lab Pro.
            <button type="button" onClick={() => openBilling?.('collections')} className={`ml-2 ${a.text} hover:${a.textSoft}`}>Unlock</button>
          </div>
        )}
        {d.showTagFilters && lib.allLibTags.length > 0 && (
          <div className="flex flex-wrap gap-1">
            {lib.allLibTags.map(t => (
              <TagChip key={t} tag={t} selected={lib.activeTag === t} onClick={() => lib.setActiveTag(p => p === t ? null : t)} />
            ))}
          </div>
        )}
      </div>

      {showImportPanel && <PresetImportPanel m={m} lib={lib} onClose={() => setShowImportPanel(false)} />}

      <div className={listLayoutClass}>
        {lib.filtered.length === 0 && !showImportPanel && (
          <div className={`ui-empty-state h-full ${m.codeBlock} border ${m.border} ${d.grid ? 'col-span-2' : ''}`}>
            <Ic n="Wand2" size={24} className={m.textMuted} />
            <p className={`text-sm font-semibold ${m.textSub} mt-2`}>
              {lib.library.length === 0 ? 'No saved prompts yet.' : 'No results found.'}
            </p>
            <p className={`mt-1 max-w-sm text-xs leading-relaxed ${m.textMuted}`}>
              {lib.library.length === 0
                ? 'Load a starter library, import a pack, or save your current draft to seed the workspace.'
                : 'Your current search, tag, or collection filters are hiding every saved prompt.'}
            </p>
            <div className="mt-3 flex flex-wrap items-center justify-center gap-2">
              {lib.library.length === 0 && primaryStarterPack && (
                <button type="button" onClick={() => lib.loadStarterPack(primaryStarterPack.id)}
                  className={`ui-control rounded-lg ${a.solid} px-3 py-1.5 text-xs font-semibold ${a.solidText}`}>
                  Load {primaryStarterPack.name}
                </button>
              )}
              {lib.library.length > 0 && hasLibraryFilters && (
                <button type="button" onClick={clearLibraryFilters}
                  className={`ui-control rounded-lg ${a.solid} px-3 py-1.5 text-xs font-semibold ${a.solidText}`}>
                  Clear Filters
                </button>
              )}
              <button type="button" onClick={() => setShowImportPanel(true)}
                className={`ui-control rounded-lg px-3 py-1.5 text-xs font-semibold ${m.btn} ${m.textAlt}`}>
                Import Pack
              </button>
            </div>
          </div>
        )}

        {lib.filtered.map((entry, index) => {
          const manual = lib.sortBy === 'manual';
          const shareUrl = lib.shareId === entry.id ? lib.getShareUrl(entry) : null;
          const collectionLabel = entry.collection || 'Unassigned';
          const previousCollectionLabel = index > 0 ? (lib.filtered[index - 1].collection || 'Unassigned') : null;
          const showCollectionHeader = lib.sortBy === 'group' && collectionLabel !== previousCollectionLabel;
          const isDraft = entry.metadata?.status === 'draft' || (!entry.enhanced?.trim() && !entry.original?.trim());
          const vars = extractVars(entry.enhanced);
          const isExpanded = lib.expandedId === entry.id;

          const previewText = entry.enhanced?.trim() || entry.original?.trim() || '';
          const showPreview = (d.showInlinePreview && previewText && !isExpanded);
          const previewLines = d.previewLines || 2;

          return (
            <div key={entry.id} className={showCollectionHeader && !d.grid ? 'contents' : ''}>
              {showCollectionHeader && !d.grid && (
                <div className={`shrink-0 flex items-center gap-2 ${index === 0 ? '' : 'pt-2'}`}>
                  <span className={`text-[11px] font-semibold uppercase tracking-wider ${m.textSub}`}>{collectionLabel}</span>
                  <div className={`flex-1 border-t ${m.border}`} />
                </div>
              )}
              <div
                draggable={manual}
                onDragStart={e => { if (!manual) return; e.dataTransfer.setData('libraryEntryId', entry.id); lib.setDraggingLibraryId(entry.id); }}
                onDragEnd={() => { lib.setDraggingLibraryId(null); lib.setDragOverLibraryId(null); }}
                onDragOver={e => { if (!manual) return; e.preventDefault(); lib.setDragOverLibraryId(entry.id); }}
                onDrop={e => {
                  if (!manual) return;
                  e.preventDefault();
                  const sourceId = e.dataTransfer.getData('libraryEntryId');
                  const rect = e.currentTarget.getBoundingClientRect();
                  const position = e.clientY > rect.top + rect.height / 2 ? 'after' : 'before';
                  lib.moveLibraryEntry(sourceId, entry.id, position);
                  lib.setDragOverLibraryId(null);
                }}
                className={`shrink-0 ${s.rowFrame(m, a)} transition-colors ${manual ? 'cursor-grab active:cursor-grabbing' : ''} ${lib.dragOverLibraryId === entry.id ? '!border-violet-500' : ''} ${lib.draggingLibraryId === entry.id ? 'opacity-50' : ''}`}>
                <div className={`flex items-start justify-between ${d.rowPad} gap-2`}>
                  <div className="flex-1 min-w-0">
                    {lib.renamingId === entry.id ? (
                      <div className="flex gap-1.5">
                        <input autoFocus value={lib.renameValue} onChange={e => lib.setRenameValue(e.target.value)}
                          onKeyDown={e => { if (e.key === 'Enter') lib.renameEntry(entry.id, lib.renameValue); if (e.key === 'Escape') { lib.setRenamingId(null); lib.setRenameValue(''); } }}
                          className={`flex-1 ${m.input} rounded-lg px-2 py-1 text-xs focus:outline-none ${a.focusBorder} ${m.text}`} />
                        <button type="button" onClick={() => lib.renameEntry(entry.id, lib.renameValue)}
                          className={`ui-control px-2 py-1 text-xs ${a.solid} ${a.solidText} rounded-lg`}>Save</button>
                        <button type="button" onClick={() => { lib.setRenamingId(null); lib.setRenameValue(''); }}
                          className={`ui-control px-2 py-1 text-xs ${m.btn} ${m.textAlt} rounded-lg`}>Cancel</button>
                      </div>
                    ) : (
                      <p className={`${d.titleSize} ${s.titleWeight} ${s.titleFont} ${m.text} truncate flex items-center gap-1.5`}>
                        {entry.title || 'Untitled'}
                        {isDraft && <DraftBadge tone="warning">draft</DraftBadge>}
                      </p>
                    )}
                    <div className={`flex items-center gap-2 ${metaClass} mt-0.5 flex-wrap`}>
                      {d.metaVisible.collection && entry.collection && (
                        <span className="flex items-center gap-1"><Ic n="FolderOpen" size={8} />{entry.collection}</span>
                      )}
                      {d.metaVisible.date && <span>{new Date(entry.createdAt).toLocaleDateString()}</span>}
                      {d.metaVisible.useCount && entry.useCount > 0 && (
                        <span className={a.text}>{entry.useCount}×</span>
                      )}
                      {d.metaVisible.versions && (entry.versions || []).length > 0 && (
                        <span className="flex items-center gap-0.5 text-blue-400">
                          <Ic n="Clock" size={8} />{entry.versions.length}v
                        </span>
                      )}
                      {d.metaVisible.vars && vars.length > 0 && <span className="text-amber-400 font-mono">{'{{vars}}'}</span>}
                    </div>
                    {showPreview && (
                      <p className={`${d.metaSize} ${m.textAlt} mt-1.5 leading-relaxed`}
                         style={{ display: '-webkit-box', WebkitLineClamp: previewLines, WebkitBoxOrient: 'vertical', overflow: 'hidden' }}>
                        {previewText}
                      </p>
                    )}
                  </div>
                  <div className={`flex items-center gap-1 shrink-0 ${d.grid ? 'flex-col' : ''}`}>
                    {manual && !d.grid && (
                      <>
                        <Ic n="GripVertical" size={12} className={m.textMuted} />
                        <button type="button" aria-label={`Move ${entry.title} up`} disabled={index === 0}
                          onClick={() => lib.moveLibraryEntryByOffset(entry.id, -1, lib.filtered)}
                          className={`ui-control px-1.5 py-1 rounded ${m.btn} ${m.textAlt} text-xs disabled:opacity-40`}>
                          <Ic n="ChevronUp" size={11} />
                        </button>
                        <button type="button" aria-label={`Move ${entry.title} down`} disabled={index === lib.filtered.length - 1}
                          onClick={() => lib.moveLibraryEntryByOffset(entry.id, 1, lib.filtered)}
                          className={`ui-control px-1.5 py-1 rounded ${m.btn} ${m.textAlt} text-xs disabled:opacity-40`}>
                          <Ic n="ChevronDown" size={11} />
                        </button>
                      </>
                    )}
                    <button type="button" onClick={() => loadEntry(entry)}
                      className={`ui-control rounded ${m.btn} ${a.text} ${d.actionSize} font-semibold`}>Use</button>
                    <button type="button" onClick={() => { copy(entry.enhanced); lib.bumpUse(entry.id); }}
                      className={`ui-control rounded ${m.btn} ${m.textAlt} ${d.actionSize} font-semibold hover:${a.text}`}>Copy</button>
                    <button type="button" onClick={() => lib.setExpandedId(p => p === entry.id ? null : entry.id)}
                      className={`ui-control rounded ${m.btn} ${m.textAlt} ${d.actionSize} font-semibold flex items-center gap-1`}>
                      More <Ic n={isExpanded ? 'ChevronUp' : 'ChevronDown'} size={11} />
                    </button>
                  </div>
                </div>

                {(entry.tags || []).length > 0 && (
                  <div className={`flex flex-wrap gap-1 px-3 pb-2 ${d.grid ? 'pt-0' : ''}`}>
                    {entry.tags.slice(0, d.grid ? 3 : 99).map(t => <TagChip key={t} tag={t} />)}
                    {d.grid && entry.tags.length > 3 && (
                      <span className={`text-[10px] ${m.textMuted} self-center`}>+{entry.tags.length - 3}</span>
                    )}
                  </div>
                )}

                {lib.shareId === entry.id && (
                  <div className={`${s.divider(m)} px-3 py-2 flex gap-2`}>
                    <input readOnly className={`flex-1 ${m.input} rounded-lg px-2 py-1 text-xs focus:outline-none ${m.text} font-mono`}
                      value={shareUrl || ''} onFocus={e => e.target.select()} />
                    <button type="button" onClick={() => copy(shareUrl || '')}
                      className={`ui-control px-2 py-1 ${a.solid} ${a.solidText} rounded-lg text-xs font-medium`}>Copy URL</button>
                  </div>
                )}

                {isExpanded && (
                  <div className={`${s.divider(m)} px-3 py-3 flex flex-col gap-3`}>
                    <div className="flex flex-wrap gap-2">
                      <button type="button" onClick={() => openSavePanel(entry)} className={`ui-control px-2 py-1 rounded ${m.btn} ${m.textAlt} text-xs`}>Edit details</button>
                      <button type="button" onClick={() => addToComposer(entry)} className={`ui-control px-2 py-1 rounded ${m.btn} ${m.textAlt} text-xs flex items-center gap-1`}><Ic n="Layers" size={11} />Build Sequence</button>
                      <button type="button" onClick={() => sendToABTest(entry, 'a')} className={`ui-control px-2 py-1 rounded ${m.btn} ${m.textAlt} text-xs flex items-center gap-1`}><Ic n="FlaskConical" size={11} />A/B A</button>
                      <button type="button" onClick={() => sendToABTest(entry, 'b')} className={`ui-control px-2 py-1 rounded ${m.btn} ${m.textAlt} text-xs flex items-center gap-1`}><Ic n="FlaskConical" size={11} />A/B B</button>
                      <button type="button" onClick={() => {
                        if ((looksSensitive(entry.original) || looksSensitive(entry.enhanced) || looksSensitive(entry.notes))
                          && !window.confirm('This shared link may include sensitive content. Continue?')) return;
                        lib.setShareId(p => p === entry.id ? null : entry.id);
                      }} className={`ui-control px-2 py-1 rounded ${m.btn} ${m.textAlt} text-xs flex items-center gap-1`}>
                        <Ic n="Share2" size={11} />Share link
                      </button>
                      <button type="button" onClick={() => { lib.setRenamingId(entry.id); lib.setRenameValue(entry.title); }}
                        className={`ui-control px-2 py-1 rounded ${m.btn} ${m.textAlt} text-xs`}>Rename</button>
                    </div>

                    {[['Original', m.textSub, entry.original], ['Enhanced', a.text, entry.enhanced]].map(([lbl, col, txt]) => (
                      <div key={lbl}>
                        <p className={`text-xs ${col} font-semibold mb-1 uppercase tracking-wider`}>{lbl}</p>
                        <div className={`text-xs ${m.textBody} leading-relaxed ${m.codeBlock} rounded-lg p-2 border ${m.border}`}>
                          <MarkdownPreview text={txt || ''} className="text-xs whitespace-pre-wrap" />
                        </div>
                      </div>
                    ))}

                    {entry.notes && (
                      <div>
                        <p className={`text-xs ${m.notesText} font-semibold mb-1 uppercase tracking-wider`}>Notes</p>
                        <p className={`text-xs ${m.textAlt} leading-relaxed`}>{entry.notes}</p>
                      </div>
                    )}

                    {(entry.variants || []).length > 0 && (
                      <div>
                        <p className={`text-xs ${m.textSub} font-semibold mb-1.5 uppercase tracking-wider`}>Variants</p>
                        {entry.variants.map((v, i) => (
                          <div key={i} className="mb-1.5">
                            <span className={`text-xs ${a.text} font-bold`}>{v.label}: </span>
                            <span className={`text-xs ${m.textAlt}`}>{v.content}</span>
                          </div>
                        ))}
                      </div>
                    )}

                    {(entry.versions || []).length > 0 && (
                      <div>
                        <div className="flex items-center justify-between mb-1">
                          <p className="text-xs text-blue-400 font-semibold uppercase tracking-wider flex items-center gap-1">
                            <Ic n="Clock" size={9} />Version History ({entry.versions.length})
                          </p>
                          <button type="button" onClick={() => window.__toast?.('Version history modal (stub).')}
                            className={`text-xs ${m.textSub} hover:text-white flex items-center gap-1 rounded-lg px-1.5 py-0.5`}>
                            <Ic n="GitBranch" size={9} />Open History
                          </button>
                        </div>
                        <div className={`${m.codeBlock} border ${m.border} rounded-lg p-2.5 text-xs ${m.textAlt}`}>
                          <div className="flex items-center justify-between gap-3">
                            <span>Latest snapshot: {new Date(entry.versions[entry.versions.length - 1].savedAt).toLocaleString()}</span>
                            <span className={m.textMuted}>Restore and compare in modal</span>
                          </div>
                        </div>
                      </div>
                    )}

                    <div className={`pt-1 ${s.divider(m)}`}>
                      <button type="button" onClick={() => { if (window.confirm(`Delete "${entry.title}"?`)) lib.del(entry.id); }}
                        className="ui-control px-2.5 py-1.5 rounded bg-red-600 hover:bg-red-500 text-white text-xs font-semibold flex items-center gap-1">
                        <Ic n="Trash2" size={11} />Delete Prompt
                      </button>
                    </div>
                  </div>
                )}
              </div>
            </div>
          );
        })}

        {lib.starterLibraries && lib.starterLibraries.some(p => !p.loaded) && (
          <div className={`mt-4 pt-4 border-t ${m.border} ${d.grid ? 'col-span-2' : ''}`}>
            <p className={`text-xs ${m.textSub} uppercase tracking-widest font-semibold mb-3`}>Starter Libraries</p>
            <div className="flex flex-col gap-2">
              {lib.starterLibraries.map(pack => (
                <StarterPackCard key={pack.id} pack={pack} m={m} onLoad={lib.loadStarterPack} />
              ))}
            </div>
          </div>
        )}
      </div>
    </div>
  );
}

function Toast() {
  const [msg, setMsg] = useState(null);
  useEffect(() => {
    window.__toast = (t) => {
      setMsg(t);
      clearTimeout(window.__toastTimer);
      window.__toastTimer = setTimeout(() => setMsg(null), 2000);
    };
  }, []);
  if (!msg) return null;
  return (
    <div className="toast fixed left-1/2 -translate-x-1/2 bottom-6 z-50
      bg-gray-900 border border-gray-700 text-gray-100 text-[12.5px]
      px-3.5 py-2 rounded-lg shadow-2xl shadow-black/60">
      {msg}
    </div>
  );
}

        </div>
        {entry && (
          <button onClick={onClear} className={`ui-control px-2.5 py-1 rounded ${m.btn} ${m.textAlt} text-xs`}>Clear</button>

      <div className="flex-1 min-h-0 overflow-y-auto p-4 flex flex-col gap-3">
        {!entry && (

              <button className={`ui-control px-3 py-1.5 rounded-lg text-xs font-medium ${m.btn} ${m.textAlt}`}>Send to A/B</button>
            </div>
          </>
        )}

  const [loadedEntry, setLoadedEntry] = useState(null);

  const [tweakValues, setTweak] = useTweaks(DEFAULT_TWEAKS);
  const tw = resolveTweaks(tweakValues);

  const m = T[theme];
  const lib = usePromptLibrary({
    initialLibrary: SEED_LIBRARY,
    initialCollections: SEED_COLLECTIONS,
    starterPacks: STARTER_PACKS,
  });

  const copy = (txt) => { navigator.clipboard?.writeText(txt || ''); window.__toast?.('Copied to clipboard.'); };
  const loadEntry = (entry) => { setLoadedEntry(entry); lib.bumpUse(entry.id); window.__toast?.(`Loaded "${entry.title}".`); };
  const sendToABTest = (entry, slot) => window.__toast?.(`Sent to A/B slot ${slot.toUpperCase()}: ${entry.title}`);

  const compact = shell === 'extension';
  const isWeb = shell === 'web';

  useEffect(() => {
    document.documentElement.classList.toggle('light', theme === 'light');
  }, [theme]);

  const frameW = shell === 'extension' ? 420 : shell === 'desktop' ? 1120 : 1280;
  const frameH = 720;

  return (
    <div className="min-h-screen w-full flex flex-col items-center justify-start py-8 px-4"
      style={{ background: theme === 'dark' ? '#030712' : '#e2e8f0' }}>
      <div className="w-full max-w-[1280px] mb-5 flex items-center gap-3 flex-wrap">
        <div className={`flex items-center gap-2 ${m.text}`}>
          <div className={`w-8 h-8 rounded-lg ${tw.accent.brandBg} grid place-items-center shadow-lg ${tw.accent.brandShadow}`}>
            <Ic n="Sparkles" size={16} className={tw.accent.solidText} />
          </div>
          <div>
            <p className="text-sm font-semibold leading-tight">PromptLab</p>
            <p className={`text-[11px] ${m.textMuted} leading-tight`}>Library v2 · interactive preview</p>
          </div>
        </div>
        <div className="flex-1" />
        <div className={`flex gap-1 p-1 rounded-lg ${m.surface} border ${m.border}`}>
          {['extension', 'desktop', 'web'].map(s => (
            <button key={s} onClick={() => setShell(s)}
              className={`ui-control px-3 py-1 rounded-md text-xs font-medium ${shell === s ? tw.accent.active : `${m.textAlt}`}`}>
              {s[0].toUpperCase() + s.slice(1)}
            </button>
          ))}
        </div>
        <label className={`flex items-center gap-2 ${m.textAlt} text-xs`}>
          <input type="checkbox" checked={canUseCollections} onChange={e => setCanUseCollections(e.target.checked)}
            className="rounded border-gray-600" />
          Pro: Collections
        </label>
        <label className={`flex items-center gap-2 ${m.textAlt} text-xs`}>
          <input type="checkbox" checked={canExportLibrary} onChange={e => setCanExportLibrary(e.target.checked)}
            className="rounded border-gray-600" />
          Pro: Export
        </label>
        <button onClick={() => setTheme(t => t === 'dark' ? 'light' : 'dark')}
          className={`ui-control p-2 rounded-lg ${m.surface} border ${m.border} ${m.textAlt}`} aria-label="Toggle theme">
          <Ic n={theme === 'dark' ? 'Sun' : 'Moon'} size={14} />
        </button>
      </div>

      <div className={`${m.bg} ${m.text} rounded-2xl border ${m.border} shadow-2xl shadow-black/40 overflow-hidden flex`}
        style={{ width: frameW, maxWidth: '100%', height: frameH }}>
        {shell !== 'extension' ? (
          <div className="flex flex-col w-full">
            <div className={`flex items-center gap-2 px-4 h-10 border-b ${m.border} ${m.header}`}>
              {shell === 'desktop' ? (
                <>
                  <span className="w-3 h-3 rounded-full bg-red-500/80" />
                  <span className="w-3 h-3 rounded-full bg-amber-400/80" />
                  <span className="w-3 h-3 rounded-full bg-emerald-500/80" />
                  <span className={`ml-3 text-xs font-semibold ${m.textSub}`}>PromptLab — Desktop</span>
                </>
              ) : (
                <div className={`flex items-center gap-2 px-3 py-1 rounded-md ${m.codeBlock} border ${m.border} text-xs ${m.textMuted} font-mono`}>
                  promptlab.tools/app/#/library
                </div>
              )}
            </div>
            <div className="flex-1 flex min-h-0">
              <div className={`w-[420px] border-r ${m.border} flex flex-col min-h-0`}>
                <LibrarySectionHeader m={m} count={lib.filtered.length} total={lib.library.length} />
                <LibraryPanel
                  m={m} lib={lib} compact={false} isWeb={isWeb} tw={tw}
                  canUseCollections={canUseCollections} canExportLibrary={canExportLibrary}
                  openBilling={openBilling}
                  loadEntry={loadEntry} copy={copy} sendToABTest={sendToABTest}
                  openSavePanel={openSavePanel} addToComposer={addToComposer}
                />
              </div>
              <div className="flex-1 min-w-0">
                <EditorPreview m={m} entry={loadedEntry} onClear={() => setLoadedEntry(null)} tw={tw} />
              </div>
            </div>
          </div>
        ) : (
          <div className="flex flex-col w-full">
            <div className={`flex items-center gap-2 px-3 h-10 border-b ${m.border} ${m.header}`}>
              <Ic n="Menu" size={14} className={m.textMuted} />
              <p className={`text-xs font-semibold ${m.text}`}>Library</p>
              <div className="flex-1" />
              <p className={`text-[11px] ${m.textMuted}`}>{lib.filtered.length} of {lib.library.length}</p>
            </div>
            <div className="flex-1 flex min-h-0">
              <LibraryPanel
                m={m} lib={lib} compact={true} isWeb={isWeb} tw={tw}
                canUseCollections={canUseCollections} canExportLibrary={canExportLibrary}
                openBilling={openBilling}
                loadEntry={loadEntry} copy={copy} sendToABTest={sendToABTest}
                openSavePanel={openSavePanel} addToComposer={addToComposer}
              />
            </div>
          </div>
        )}
      </div>

      <p className={`mt-4 text-[11px] ${theme === 'dark' ? 'text-gray-600' : 'text-slate-500'}`}>
        Toggle shell, theme, and Pro gates above. All interactions are local state — no backend.
      </p>

      <Toast />
      <LibraryTweaks values={tweakValues} setTweak={setTweak} />
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
