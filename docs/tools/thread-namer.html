<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thread Namer</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap');

        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        :root {
            --bg: #f5f4f1;
            --surface: #ffffff;
            --surface2: #f9f8f6;
            --border: #e4e2dc;
            --border-dim: #ede9e3;
            --text: #2a2825;
            --muted: #8c8880;
            --dim: #c4bfb8;

            --accent: #6b4fbb;
            --accent-light: #f0ecfa;
            --accent-mid: #d6cdf5;
            --accent-text: #5a3ea8;

            --tag-bg: #f0ecfa;
            --tag-text: #5a3ea8;
            --tag-border: #d6cdf5;

            --green: #2d7d52;
            --green-bg: #edf6f0;
        }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px 20px 80px;
        }

        /* ── header ── */
        .header {
            width: 100%;
            max-width: 720px;
            margin-bottom: 32px;
            display: flex;
            align-items: baseline;
            gap: 12px;
        }

        .header-title {
            font-family: 'JetBrains Mono', monospace;
            font-size: 18px;
            font-weight: 500;
            color: var(--text);
            letter-spacing: -0.01em;
        }

        .header-title span {
            color: var(--accent);
        }

        .header-sub {
            font-size: 12px;
            color: var(--muted);
            font-weight: 400;
        }

        /* ── project selector ── */
        .section-label {
            font-family: 'JetBrains Mono', monospace;
            font-size: 9px;
            letter-spacing: 0.12em;
            color: var(--muted);
            text-transform: uppercase;
            margin-bottom: 8px;
        }

        .project-selector {
            width: 100%;
            max-width: 720px;
            margin-bottom: 16px;
        }

        .project-tabs {
            display: flex;
            gap: 5px;
            flex-wrap: wrap;
        }

        .project-tab {
            font-family: 'Inter', sans-serif;
            font-size: 12px;
            font-weight: 500;
            padding: 6px 12px;
            border-radius: 20px;
            border: 1px solid var(--border);
            background: var(--surface);
            color: var(--muted);
            cursor: pointer;
            transition: all 0.12s ease;
            display: flex;
            align-items: center;
            gap: 5px;
            white-space: nowrap;
        }

        .project-tab:hover {
            border-color: var(--accent-mid);
            color: var(--accent-text);
            background: var(--accent-light);
        }

        .project-tab.active {
            background: var(--accent);
            border-color: var(--accent);
            color: #fff;
        }

        /* ── two col layout ── */
        .main-layout {
            width: 100%;
            max-width: 720px;
            display: grid;
            grid-template-columns: 1fr 260px;
            gap: 12px;
            align-items: start;
        }

        @media (max-width: 600px) {
            .main-layout {
                grid-template-columns: 1fr;
            }
        }

        /* ── card ── */
        .card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 10px;
            overflow: hidden;
        }

        .card-header {
            padding: 11px 16px;
            border-bottom: 1px solid var(--border-dim);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .card-header-label {
            font-family: 'JetBrains Mono', monospace;
            font-size: 9px;
            letter-spacing: 0.12em;
            color: var(--muted);
            text-transform: uppercase;
            flex: 1;
        }

        .project-badge {
            font-family: 'JetBrains Mono', monospace;
            font-size: 9px;
            padding: 2px 7px;
            border-radius: 10px;
            background: var(--tag-bg);
            color: var(--tag-text);
            border: 1px solid var(--tag-border);
            letter-spacing: 0.06em;
        }

        .card-body {
            padding: 16px;
        }

        /* ── taxonomy ── */
        .taxonomy-grid {
            display: flex;
            flex-direction: column;
            gap: 3px;
        }

        .tax-item {
            font-size: 11.5px;
            padding: 5px 8px;
            border-radius: 6px;
            background: var(--surface2);
            border: 1px solid var(--border-dim);
            color: var(--muted);
            display: flex;
            align-items: center;
            gap: 7px;
            cursor: default;
            transition: background 0.1s;
        }

        .tax-item:hover {
            background: var(--accent-light);
        }

        .tax-item .tax-emoji {
            font-size: 13px;
            line-height: 1;
            flex-shrink: 0;
        }

        .tax-item .tax-label {
            color: var(--text);
            font-size: 11px;
            font-weight: 400;
        }

        /* ── input area ── */
        textarea {
            width: 100%;
            min-height: 100px;
            background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: 7px;
            color: var(--text);
            font-family: 'Inter', sans-serif;
            font-size: 13.5px;
            line-height: 1.6;
            padding: 12px 14px;
            resize: vertical;
            outline: none;
            transition: border-color 0.12s;
        }

        textarea:focus {
            border-color: var(--accent);
        }

        textarea::placeholder {
            color: var(--dim);
        }

        .date-row {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-top: 10px;
        }

        .date-label {
            font-family: 'JetBrains Mono', monospace;
            font-size: 9px;
            color: var(--muted);
            letter-spacing: 0.1em;
            text-transform: uppercase;
            white-space: nowrap;
        }

        input[type="date"] {
            background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: 6px;
            color: var(--text);
            font-family: 'JetBrains Mono', monospace;
            font-size: 11px;
            padding: 5px 9px;
            outline: none;
            transition: border-color 0.12s;
            color-scheme: light;
        }

        input[type="date"]:focus {
            border-color: var(--accent);
        }

        .generate-btn {
            margin-left: auto;
            font-family: 'Inter', sans-serif;
            font-size: 12px;
            font-weight: 600;
            letter-spacing: 0.02em;
            padding: 7px 18px;
            border-radius: 6px;
            border: none;
            background: var(--accent);
            color: #fff;
            cursor: pointer;
            transition: all 0.12s;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .generate-btn:hover:not(:disabled) {
            background: #5a3ea8;
        }

        .generate-btn:disabled {
            opacity: 0.35;
            cursor: not-allowed;
        }

        /* ── output ── */
        .output-wrap {
            width: 100%;
            max-width: 720px;
            margin-top: 12px;
        }

        .output-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 10px;
            overflow: hidden;
            display: none;
        }

        .output-card.visible {
            display: block;
        }

        .output-header {
            padding: 10px 16px;
            border-bottom: 1px solid var(--border-dim);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .output-dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: var(--green);
            flex-shrink: 0;
        }

        .output-header-label {
            font-family: 'JetBrains Mono', monospace;
            font-size: 9px;
            letter-spacing: 0.12em;
            color: var(--muted);
            text-transform: uppercase;
            flex: 1;
        }

        .output-title {
            font-family: 'JetBrains Mono', monospace;
            font-size: 16px;
            font-weight: 500;
            color: var(--text);
            padding: 18px 16px 14px;
            line-height: 1.5;
            letter-spacing: -0.01em;
        }

        .output-footer {
            padding: 10px 16px;
            border-top: 1px solid var(--border-dim);
            display: flex;
            gap: 7px;
            align-items: center;
        }

        .copy-btn {
            font-family: 'Inter', sans-serif;
            font-size: 11px;
            font-weight: 500;
            padding: 5px 12px;
            border-radius: 5px;
            border: 1px solid var(--border);
            background: var(--surface2);
            color: var(--text);
            cursor: pointer;
            transition: all 0.12s;
        }

        .copy-btn:hover {
            border-color: var(--accent-mid);
            color: var(--accent-text);
        }

        .copy-btn.copied {
            border-color: var(--green);
            color: var(--green);
            background: var(--green-bg);
        }

        .regen-btn {
            font-family: 'Inter', sans-serif;
            font-size: 11px;
            font-weight: 500;
            padding: 5px 12px;
            border-radius: 5px;
            border: 1px solid var(--border);
            background: transparent;
            color: var(--muted);
            cursor: pointer;
            transition: all 0.12s;
            margin-left: auto;
        }

        .regen-btn:hover {
            color: var(--text);
            border-color: var(--dim);
        }

        /* ── loading ── */
        .loading-inline {
            display: none;
            align-items: center;
            gap: 9px;
            padding: 14px 16px;
            font-size: 12px;
            color: var(--muted);
            font-family: 'JetBrains Mono', monospace;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 10px;
        }

        .loading-inline.visible {
            display: flex;
        }

        .spinner {
            width: 13px;
            height: 13px;
            border: 2px solid var(--border);
            border-top-color: var(--accent);
            border-radius: 50%;
            animation: spin 0.65s linear infinite;
            flex-shrink: 0;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        /* ── error ── */
        .error-msg {
            display: none;
            font-size: 11.5px;
            color: #b91c1c;
            padding: 9px 13px;
            background: #fef2f2;
            border: 1px solid #fecaca;
            border-radius: 7px;
            margin-top: 10px;
            font-family: 'JetBrains Mono', monospace;
        }

        .error-msg.visible {
            display: block;
        }

        /* ── history ── */
        .history-section {
            width: 100%;
            max-width: 720px;
            margin-top: 16px;
            display: none;
        }

        .history-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 7px;
        }

        .clear-history {
            background: none;
            border: none;
            color: var(--dim);
            font-family: 'JetBrains Mono', monospace;
            font-size: 9px;
            cursor: pointer;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            transition: color 0.12s;
        }

        .clear-history:hover {
            color: var(--muted);
        }

        .history-list {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .history-item {
            font-family: 'JetBrains Mono', monospace;
            font-size: 11.5px;
            padding: 8px 12px;
            background: var(--surface);
            border: 1px solid var(--border-dim);
            border-radius: 7px;
            color: var(--text);
            display: flex;
            align-items: center;
            gap: 9px;
            cursor: default;
            transition: border-color 0.12s;
        }

        .history-item:hover {
            border-color: var(--border);
        }

        .h-project {
            font-size: 8.5px;
            padding: 2px 6px;
            border-radius: 8px;
            background: var(--tag-bg);
            color: var(--tag-text);
            white-space: nowrap;
            flex-shrink: 0;
        }

        .h-title {
            flex: 1;
            font-size: 11px;
        }

        .h-copy {
            font-size: 9px;
            color: var(--dim);
            background: none;
            border: 1px solid transparent;
            cursor: pointer;
            font-family: 'JetBrains Mono', monospace;
            padding: 2px 6px;
            border-radius: 4px;
            transition: all 0.12s;
            flex-shrink: 0;
        }

        .h-copy:hover {
            color: var(--accent-text);
            border-color: var(--accent-mid);
            background: var(--accent-light);
        }
    </style>
</head>

<body>

    <div class="header">
        <div class="header-title">// <span>thread</span>.rename</div>
        <div class="header-sub">Prompt Lab · Thread Namer</div>
    </div>

    <!-- SETTINGS -->
    <div class="project-selector">
        <div class="section-label">Provider</div>
        <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap;margin-bottom:12px;">
            <select id="providerSelect" style="font-family:'JetBrains Mono',monospace;font-size:11px;padding:6px 10px;border-radius:4px;border:1px solid var(--border);background:var(--surface);color:var(--text);">
                <option value="openai">OpenAI</option>
                <option value="gemini">Gemini</option>
            </select>
            <input type="password" id="apiKeyInput" placeholder="API key" autocomplete="off" style="flex:1;min-width:180px;font-family:'JetBrains Mono',monospace;font-size:11px;padding:6px 10px;border-radius:4px;border:1px solid var(--border);background:var(--surface);color:var(--text);">
            <input type="text" id="modelInput" placeholder="Model" style="width:140px;font-family:'JetBrains Mono',monospace;font-size:11px;padding:6px 10px;border-radius:4px;border:1px solid var(--border);background:var(--surface);color:var(--text);">
            <button onclick="saveProviderSettings()" style="font-family:'JetBrains Mono',monospace;font-size:10px;padding:6px 12px;border-radius:4px;border:1px solid var(--accent-mid);background:var(--accent-light);color:var(--accent-text);cursor:pointer;">Save</button>
        </div>
        <div id="settingsStatus" style="font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--muted);margin-bottom:12px;"></div>
    </div>

    <!-- PROJECT SELECTOR -->
    <div class="project-selector">
        <div class="section-label">Project</div>
        <div class="project-tabs" id="projectTabs"></div>
    </div>

    <!-- MAIN LAYOUT -->
    <div class="main-layout">

        <!-- LEFT: INPUT -->
        <div>
            <div class="card">
                <div class="card-header">
                    <div class="card-header-label">Thread Summary</div>
                    <div class="project-badge" id="activeBadge">—</div>
                </div>
                <div class="card-body">
                    <textarea id="summaryInput"
                        placeholder="Paste or type a brief summary of what the conversation covers…"></textarea>
                    <div class="date-row">
                        <span class="date-label">Date</span>
                        <input type="date" id="dateInput">
                        <button class="generate-btn" id="generateBtn" onclick="generate()" disabled>
                            <span id="btnLabel">Generate</span>
                        </button>
                    </div>
                </div>
            </div>
        </div>

        <!-- RIGHT: TAXONOMY -->
        <div>
            <div class="card">
                <div class="card-header">
                    <div class="card-header-label">Emoji Taxonomy</div>
                </div>
                <div class="card-body" style="padding:10px 12px;">
                    <div class="taxonomy-grid" id="taxonomyGrid"></div>
                </div>
            </div>
        </div>

    </div>

    <!-- OUTPUT AREA -->
    <div class="output-wrap">
        <div class="loading-inline" id="loadingCard">
            <div class="spinner"></div>
            <span>Generating title…</span>
        </div>
        <div class="error-msg" id="errorMsg"></div>
        <div class="output-card" id="outputCard">
            <div class="output-header">
                <div class="output-dot"></div>
                <div class="output-header-label">Generated Title</div>
            </div>
            <div class="output-title" id="outputTitle"></div>
            <div class="output-footer">
                <button class="copy-btn" id="copyBtn" onclick="copyTitle()">Copy</button>
                <button class="regen-btn" onclick="generate()">↺ Regenerate</button>
            </div>
        </div>
    </div>

    <!-- HISTORY -->
    <div class="history-section" id="historySection">
        <div class="history-header">
            <div class="section-label">Session History</div>
            <button class="clear-history" onclick="clearHistory()">Clear</button>
        </div>
        <div class="history-list" id="historyList"></div>
    </div>

    <script src="./openai-local-tools.js"></script>
    <script>
        const SETTINGS_KEY = 'thread-namer-v2.settings';
        const PROVIDER_DEFAULTS = {
            openai: { model: 'gpt-4.1-mini', placeholder: 'sk-...' },
            gemini: { model: 'gemini-2.5-flash', placeholder: 'AIza...' },
        };

        function loadProviderSettings() {
            try {
                return JSON.parse(localStorage.getItem(SETTINGS_KEY)) || { provider: 'openai', apiKey: '', model: '' };
            } catch { return { provider: 'openai', apiKey: '', model: '' }; }
        }

        function saveProviderSettings() {
            const provider = document.getElementById('providerSelect').value;
            const apiKey = document.getElementById('apiKeyInput').value.trim();
            const model = document.getElementById('modelInput').value.trim() || PROVIDER_DEFAULTS[provider].model;
            localStorage.setItem(SETTINGS_KEY, JSON.stringify({ provider, apiKey, model }));
            document.getElementById('settingsStatus').textContent = '✓ Settings saved';
            setTimeout(() => { document.getElementById('settingsStatus').textContent = ''; }, 2000);
        }

        function initProviderUI() {
            const s = loadProviderSettings();
            document.getElementById('providerSelect').value = s.provider || 'openai';
            document.getElementById('apiKeyInput').value = s.apiKey || '';
            document.getElementById('apiKeyInput').placeholder = PROVIDER_DEFAULTS[s.provider]?.placeholder || 'API key';
            document.getElementById('modelInput').value = s.model || '';
            document.getElementById('modelInput').placeholder = PROVIDER_DEFAULTS[s.provider]?.model || 'model';
            document.getElementById('providerSelect').addEventListener('change', function() {
                const p = this.value;
                document.getElementById('apiKeyInput').placeholder = PROVIDER_DEFAULTS[p].placeholder;
                document.getElementById('modelInput').placeholder = PROVIDER_DEFAULTS[p].model;
                if (!document.getElementById('modelInput').value.trim()) {
                    document.getElementById('modelInput').value = '';
                }
            });
        }

        const PROJECTS = {
            'prompt-lab': {
                label: 'Prompt Lab',
                emoji: '🔬',
                badge: 'PLB',
                taxonomy: [
                    { e: '🔬', l: 'Primary' },
                    { e: '⚙️', l: 'Extension / Config' },
                    { e: '🧩', l: 'Architecture' },
                    { e: '🎨', l: 'UI / Design' },
                    { e: '📦', l: 'Build / Deploy' },
                    { e: '🗃', l: 'Library / Storage' },
                    { e: '✏️', l: 'Editor / Prompts' },
                    { e: '🧪', l: 'Testing / A-B' },
                    { e: '🔌', l: 'API / Integration' },
                    { e: '🐛', l: 'Debug / Fix' },
                    { e: '📋', l: 'Planning / Spec' },
                    { e: '🚀', l: 'Ship / Release' },
                    { e: '🔐', l: 'Auth / Security' },
                    { e: '📡', l: 'Network / Fetch' },
                    { e: '🧠', l: 'AI / LLM Logic' },
                ],
                systemPrompt: `You rename chat threads for the Prompt Lab browser extension project (MV3, React, Vite, Tailwind).

Format: [emoji][emoji] | short descriptive title – MM-DD
- First emoji always 🔬
- Second from taxonomy: ⚙️ extension ✏️ editor 🗃 library 🧩 arch 🎨 ui 📦 build 🧪 test 🔌 api 🐛 debug 📋 spec 🚀 ship 🔐 auth 📡 network 🧠 ai
- Under 8 words, concrete nouns, system language
- End with MM-DD from provided date

Return ONLY the title in a code block.`,
            },

            'garden-os': {
                label: 'Garden OS',
                emoji: '🌱',
                badge: 'GOS',
                taxonomy: [
                    { e: '🌱', l: 'Primary' },
                    { e: '🧱', l: 'Structure' },
                    { e: '🔨', l: 'Building' },
                    { e: '📐', l: 'Diagrams' },
                    { e: '📊', l: 'Data' },
                    { e: '🧭', l: 'Planning' },
                    { e: '🧪', l: 'Experiments' },
                    { e: '🌐', l: 'Architecture' },
                    { e: '📋', l: 'Operations' },

Format: [emoji][emoji] | short descriptive title – MM-DD
- First emoji always 🕸
- Second from taxonomy: 🧩 nodes 🎨 canvas 📐 layout ⚙️ config 📊 schema 🔌 api 🧪 experiment 🐛 debug 📋 spec 🚀 ship 🌐 arch 🔍 search 📡 feed

Return ONLY the title in a code block.`,
            },

            'phosphene': {
                label: 'Phosphene',
                emoji: '💡',

                taxonomy: [
                    { e: '💡', l: 'Primary' },
                    { e: '✨', l: 'Animation / Motion' },
                    { e: '🎨', l: 'Visual Design' },

        // ─── STATE ────────────────────────────────────────────────────────────────────
        let activeProject = 'prompt-lab';
        let sessionHistory = [];

        // ─── INIT ─────────────────────────────────────────────────────────────────────
        function init() {
            initProviderUI();
            const today = new Date();
            const mm = String(today.getMonth() + 1).padStart(2, '0');
            const dd = String(today.getDate()).padStart(2, '0');
            document.getElementById('dateInput').value = `${today.getFullYear()}-${mm}-${dd}`;

            const tabsEl = document.getElementById('projectTabs');
            Object.entries(PROJECTS).forEach(([key, proj]) => {
                const btn = document.createElement('button');
                btn.className = 'project-tab' + (key === activeProject ? ' active' : '');
                btn.dataset.key = key;
                btn.innerHTML = `${proj.emoji} ${proj.label}`;
                btn.onclick = () => selectProject(key);
                tabsEl.appendChild(btn);
            });

            renderTaxonomy();
            setupTextarea();
        }

        function selectProject(key) {
            activeProject = key;
            document.querySelectorAll('.project-tab').forEach(t => t.classList.toggle('active', t.dataset.key === key));
            renderTaxonomy();
            document.getElementById('outputCard').classList.remove('visible');
            document.getElementById('errorMsg').classList.remove('visible');
        }

        function renderTaxonomy() {
            const proj = PROJECTS[activeProject];
            document.getElementById('activeBadge').textContent = proj.badge;
            const grid = document.getElementById('taxonomyGrid');
            grid.innerHTML = '';
            proj.taxonomy.forEach(item => {
                const el = document.createElement('div');
                el.className = 'tax-item';
                el.innerHTML = `<span class="tax-emoji">${item.e}</span><span class="tax-label">${item.l}</span>`;
                grid.appendChild(el);
            });
        }

        function setupTextarea() {
            const ta = document.getElementById('summaryInput');
            const btn = document.getElementById('generateBtn');
            ta.addEventListener('input', () => { btn.disabled = ta.value.trim().length < 10; });
            ta.addEventListener('keydown', e => { if ((e.metaKey || e.ctrlKey) && e.key === 'Enter') generate(); });
        }

        // ─── GENERATE ─────────────────────────────────────────────────────────────────
        async function generate() {
            const summary = document.getElementById('summaryInput').value.trim();
            const dateVal = document.getElementById('dateInput').value;
            if (!summary || summary.length < 10) return;

            const s = loadProviderSettings();
            if (!s.apiKey) {
                const el = document.getElementById('errorMsg');
                el.textContent = '⚠ Enter your API key in the Provider settings above.';
                el.classList.add('visible');
                return;
            }

            const d = new Date(dateVal + 'T00:00:00');
            const mmdd = String(d.getMonth() + 1).padStart(2, '0') + '-' + String(d.getDate()).padStart(2, '0');
            const proj = PROJECTS[activeProject];

            document.getElementById('outputCard').classList.remove('visible');
            document.getElementById('errorMsg').classList.remove('visible');
            document.getElementById('loadingCard').classList.add('visible');
            document.getElementById('generateBtn').disabled = true;
            document.getElementById('btnLabel').textContent = 'Generating…';

            try {
                const result = await window.LocalOpenAIPrototype.requestText({
                    provider: s.provider || 'openai',
                    apiKey: s.apiKey,
                    model: s.model || PROVIDER_DEFAULTS[s.provider]?.model || 'gpt-4.1-mini',
                    systemPrompt: proj.systemPrompt,
                    userPrompt: `Thread summary:\n${summary}\n\nDate: ${mmdd}\n\nReturn only ONE title in a code block.`,
                    maxOutputTokens: 80,
                });
                const raw = result.text || '';
                const title = raw.replace(/```[^\n]*\n?/g, '').replace(/```/g, '').trim();
                if (!title) throw new Error('Empty response');
                showOutput(title);
                addToHistory(title, proj.badge);
            } catch (err) {
                const el = document.getElementById('errorMsg');
                el.textContent = '⚠ ' + err.message;
                el.classList.add('visible');
            } finally {
                document.getElementById('loadingCard').classList.remove('visible');
                document.getElementById('generateBtn').disabled = document.getElementById('summaryInput').value.trim().length < 10;
                document.getElementById('btnLabel').textContent = 'Generate';
            }
        }

        function showOutput(title) {
            document.getElementById('outputTitle').textContent = title;
            document.getElementById('outputCard').classList.add('visible');
            document.getElementById('copyBtn').textContent = 'Copy';
            document.getElementById('copyBtn').classList.remove('copied');
        }

        function copyTitle() {
            copyText(document.getElementById('outputTitle').textContent);
            const btn = document.getElementById('copyBtn');
            btn.textContent = 'Copied ✓';
            btn.classList.add('copied');
            setTimeout(() => { btn.textContent = 'Copy'; btn.classList.remove('copied'); }, 1800);
        }

        function copyText(text) {
            try { navigator.clipboard.writeText(text); } catch {
                const ta = document.createElement('textarea');
                ta.value = text; ta.style.cssText = 'position:fixed;opacity:0';
                document.body.appendChild(ta); ta.select(); document.execCommand('copy'); ta.remove();
            }
        }

        function addToHistory(title, badge) {
            sessionHistory.unshift({ title, badge });
            renderHistory();
        }

        function renderHistory() {
            const sec = document.getElementById('historySection');
            if (!sessionHistory.length) { sec.style.display = 'none'; return; }
            sec.style.display = 'block';
            const list = document.getElementById('historyList');
            list.innerHTML = '';
            sessionHistory.forEach((item, i) => {
                const el = document.createElement('div');
                el.className = 'history-item';
                el.innerHTML = `<span class="h-project">${item.badge}</span><span class="h-title">${item.title}</span><button class="h-copy" onclick="copyHistoryItem(${i},this)">copy</button>`;
                list.appendChild(el);
            });
        }

        function copyHistoryItem(i, btn) {
            copyText(sessionHistory[i].title);
            btn.textContent = '✓';
            setTimeout(() => { btn.textContent = 'copy'; }, 1400);
        }

        function clearHistory() { sessionHistory = []; renderHistory(); }

        init();
    </script>
