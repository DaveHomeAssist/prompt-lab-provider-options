<?xml version="1.0" encoding="UTF-8"?>
<svg width="1600" height="2300" viewBox="0 0 1600 2300" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0b1020"/>
      <stop offset="100%" stop-color="#111827"/>
    </linearGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#131c2e"/>
      <stop offset="100%" stop-color="#17233a"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#60a5fa"/>
      <stop offset="100%" stop-color="#34d399"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="16" flood-color="#020617" flood-opacity="0.45"/>
    </filter>
    <style>
      .title { font: 700 42px Inter, Arial, sans-serif; fill: #f8fafc; }
      .subtitle { font: 500 18px Inter, Arial, sans-serif; fill: #cbd5e1; }
      .sectionTitle { font: 700 24px Inter, Arial, sans-serif; fill: #e2e8f0; }
      .label { font: 700 15px Inter, Arial, sans-serif; fill: #93c5fd; letter-spacing: 1.4px; text-transform: uppercase; }
      .body { font: 500 16px Inter, Arial, sans-serif; fill: #cbd5e1; }
      .small { font: 500 14px Inter, Arial, sans-serif; fill: #94a3b8; }
      .chip { font: 700 13px Inter, Arial, sans-serif; fill: #dbeafe; }
      .mono { font: 600 13px "SFMono-Regular", Consolas, monospace; fill: #a5b4fc; }
      .panel { fill: url(#panel); stroke: rgba(148,163,184,.22); stroke-width: 1.5; }
      .thin { stroke: rgba(148,163,184,.22); stroke-width: 1; }
      .accentStroke { stroke: url(#accent); stroke-width: 2.5; }
    </style>
  </defs>

  <rect width="1600" height="2300" fill="url(#bg)"/>

  <text x="80" y="84" class="title">Index Page Visual Architecture</text>
  <text x="80" y="118" class="subtitle">Recommended front door shell for DaveHomeAssist project index · layout regions, card anatomy, and responsive behavior</text>

  <!-- Outer page -->
  <rect x="60" y="160" width="1480" height="2060" rx="32" class="panel" filter="url(#shadow)"/>
  <text x="90" y="205" class="label">Page Frame</text>

  <!-- Header -->
  <rect x="100" y="235" width="1400" height="110" rx="20" class="panel"/>
  <text x="125" y="275" class="sectionTitle">Global Header</text>
  <text x="125" y="305" class="body">Brand · primary nav · GitHub · theme toggle</text>
  <rect x="1120" y="258" width="120" height="34" rx="17" fill="#1e293b" stroke="#334155"/>
  <text x="1143" y="280" class="chip">GitHub</text>
  <rect x="1260" y="258" width="120" height="34" rx="17" fill="#1e293b" stroke="#334155"/>
  <text x="1287" y="280" class="chip">Theme</text>

  <!-- Hero -->
  <rect x="100" y="375" width="1400" height="230" rx="24" class="panel"/>
  <text x="125" y="415" class="sectionTitle">Hero</text>
  <text x="125" y="455" style="font: 700 36px Inter, Arial, sans-serif; fill:#f8fafc;">DaveHomeAssist Projects</text>
  <text x="125" y="490" class="body">Tools, planners, and engineering experiments. Clear entry point with purpose statement and action hierarchy.</text>
  <rect x="125" y="525" width="190" height="46" rx="23" fill="url(#accent)"/>
  <text x="160" y="553" style="font:700 15px Inter, Arial, sans-serif; fill:#04111f;">Open Prompt Lab</text>
  <rect x="330" y="525" width="190" height="46" rx="23" fill="#0f172a" stroke="#334155"/>
  <text x="362" y="553" class="chip">Browse Projects</text>
  <rect x="1015" y="410" width="430" height="150" rx="18" fill="#0f172a" stroke="#334155"/>
  <text x="1040" y="445" class="small">Hero support panel</text>
  <text x="1040" y="475" class="body">Featured metadata</text>
  <text x="1040" y="505" class="body">Project count · categories · last updated</text>

  <!-- Featured -->
  <rect x="100" y="635" width="1400" height="240" rx="24" class="panel"/>
  <text x="125" y="675" class="sectionTitle">Featured Project</text>
  <rect x="125" y="700" width="1350" height="145" rx="18" fill="#0f172a" stroke="#334155"/>
  <rect x="150" y="726" width="95" height="28" rx="14" fill="#1d4ed8" opacity="0.24"/>
  <text x="173" y="745" class="chip">Featured</text>
  <text x="150" y="785" style="font:700 30px Inter, Arial, sans-serif; fill:#f8fafc;">Prompt Lab</text>
  <text x="150" y="816" class="body">Flagship card with summary, status, and stronger CTA grouping.</text>
  <rect x="1040" y="740" width="115" height="38" rx="19" fill="url(#accent)"/>
  <text x="1075" y="764" style="font:700 14px Inter, Arial, sans-serif; fill:#04111f;">Open</text>
  <rect x="1170" y="740" width="115" height="38" rx="19" fill="#111827" stroke="#334155"/>
  <text x="1205" y="764" class="chip">Docs</text>
  <rect x="1300" y="740" width="115" height="38" rx="19" fill="#111827" stroke="#334155"/>
  <text x="1330" y="764" class="chip">Repo</text>

  <!-- Categories -->
  <text x="100" y="930" class="sectionTitle">Project Sections</text>
  <text x="100" y="957" class="small">Category groupings improve scanability, prioritization, and future growth.</text>

  <!-- Tools section -->
  <rect x="100" y="985" width="1400" height="315" rx="24" class="panel"/>
  <text x="125" y="1025" class="sectionTitle">Tools</text>
  <text x="125" y="1053" class="small">Example responsive card grid</text>

  <!-- cards row 1 -->
  <g transform="translate(125 1078)">
    <rect x="0" y="0" width="400" height="185" rx="18" fill="#0f172a" stroke="#334155"/>
    <rect x="24" y="24" width="56" height="24" rx="12" fill="#1d4ed8" opacity="0.22"/><text x="37" y="41" class="chip">Tool</text>
    <text x="24" y="77" class="sectionTitle" style="font-size:22px;">Gemini API Cost Calculator</text>
    <text x="24" y="106" class="small">Short purpose, one sentence, clear primary action.</text>
    <rect x="24" y="132" width="92" height="34" rx="17" fill="url(#accent)"/><text x="53" y="154" style="font:700 13px Inter, Arial, sans-serif; fill:#04111f;">Open</text>
    <text x="295" y="153" class="mono">Live</text>
  </g>

  <g transform="translate(550 1078)">
    <rect x="0" y="0" width="400" height="185" rx="18" fill="#0f172a" stroke="#334155"/>
    <rect x="24" y="24" width="56" height="24" rx="12" fill="#1d4ed8" opacity="0.22"/><text x="37" y="41" class="chip">Tool</text>
    <text x="24" y="77" class="sectionTitle" style="font-size:22px;">Notion Widgets</text>
    <text x="24" y="106" class="small">Embeddable widgets with status and metadata slots.</text>
    <rect x="24" y="132" width="92" height="34" rx="17" fill="url(#accent)"/><text x="53" y="154" style="font:700 13px Inter, Arial, sans-serif; fill:#04111f;">Open</text>
    <text x="260" y="153" class="mono">Experimental</text>
  </g>

  <g transform="translate(975 1078)">
    <rect x="0" y="0" width="400" height="185" rx="18" fill="#0f172a" stroke="#334155"/>
    <rect x="24" y="24" width="56" height="24" rx="12" fill="#1d4ed8" opacity="0.22"/><text x="37" y="41" class="chip">Tool</text>
    <text x="24" y="77" class="sectionTitle" style="font-size:22px;">Garden Planner</text>
    <text x="24" y="106" class="small">App card example with clear affordance and concise descriptor.</text>
    <rect x="24" y="132" width="92" height="34" rx="17" fill="url(#accent)"/><text x="53" y="154" style="font:700 13px Inter, Arial, sans-serif; fill:#04111f;">Open</text>
    <text x="283" y="153" class="mono">Utility</text>
  </g>

  <!-- Dev section -->
  <rect x="100" y="1330" width="1400" height="240" rx="24" class="panel"/>
  <text x="125" y="1370" class="sectionTitle">Development & References</text>
  <g transform="translate(125 1400)">
    <rect x="0" y="0" width="295" height="130" rx="18" fill="#0f172a" stroke="#334155"/>
    <text x="20" y="35" class="chip">Dev</text><text x="20" y="68" class="body">Web Templates</text>
    <text x="20" y="96" class="small">Layout pattern library</text>
  </g>
  <g transform="translate(445 1400)">
    <rect x="0" y="0" width="295" height="130" rx="18" fill="#0f172a" stroke="#334155"/>
    <text x="20" y="35" class="chip">Dev</text><text x="20" y="68" class="body">SDLC Tool Stack Map</text>
    <text x="20" y="96" class="small">Workflow comparison reference</text>
  </g>
  <g transform="translate(765 1400)">
    <rect x="0" y="0" width="295" height="130" rx="18" fill="#0f172a" stroke="#334155"/>
    <text x="20" y="35" class="chip">Guide</text><text x="20" y="68" class="body">Scoring System Map</text>
    <text x="20" y="96" class="small">Architecture reference page</text>
  </g>
  <g transform="translate(1085 1400)">
    <rect x="0" y="0" width="295" height="130" rx="18" fill="#0f172a" stroke="#334155"/>
    <text x="20" y="35" class="chip">Repo</text><text x="20" y="68" class="body">GitHub</text>
    <text x="20" y="96" class="small">Source and docs entry point</text>
  </g>

  <!-- Footer -->
  <rect x="100" y="1600" width="1400" height="110" rx="24" class="panel"/>
  <text x="125" y="1642" class="sectionTitle">Footer Utility Zone</text>
  <text x="125" y="1670" class="body">GitHub · documentation · contact / attribution · version</text>

  <!-- Card anatomy -->
  <rect x="100" y="1760" width="660" height="380" rx="24" class="panel"/>
  <text x="125" y="1800" class="sectionTitle">Card Anatomy</text>
  <rect x="145" y="1830" width="570" height="265" rx="20" fill="#0f172a" stroke="#334155"/>
  <rect x="175" y="1860" width="92" height="28" rx="14" fill="#1d4ed8" opacity="0.22"/>
  <text x="202" y="1879" class="chip">Category</text>
  <text x="175" y="1922" style="font:700 28px Inter, Arial, sans-serif; fill:#f8fafc;">Project Card Title</text>
  <text x="175" y="1960" class="body">One or two lines max. Explain value quickly and reduce scan friction.</text>
  <rect x="175" y="2010" width="110" height="38" rx="19" fill="url(#accent)"/>
  <text x="213" y="2034" style="font:700 14px Inter, Arial, sans-serif; fill:#04111f;">Open</text>
  <text x="505" y="2033" class="mono">status · external · updated</text>
  <line x1="175" y1="2065" x2="685" y2="2065" class="thin"/>
  <text x="175" y="2095" class="small">States: default · hover · focus-visible · active · external</text>

  <!-- Responsive behavior -->
  <rect x="790" y="1760" width="710" height="380" rx="24" class="panel"/>
  <text x="815" y="1800" class="sectionTitle">Responsive Grid Behavior</text>
  <rect x="820" y="1830" width="650" height="280" rx="20" fill="#0f172a" stroke="#334155"/>
  <text x="845" y="1870" class="chip">Breakpoints</text>
  <text x="845" y="1910" class="body">Mobile 320–480 px  → 1 column</text>
  <text x="845" y="1945" class="body">Large Mobile 481–767 px  → 1 column</text>
  <text x="845" y="1980" class="body">Tablet 768–1024 px  → 2 columns</text>
  <text x="845" y="2015" class="body">Laptop 1025–1440 px  → 3 columns</text>
  <text x="845" y="2050" class="body">Desktop 1441–1919 px  → 3 columns</text>
  <text x="845" y="2085" class="body">Ultra wide 1920+ px  → 4 columns with max-width container</text>

  <!-- arrows / flow -->
  <path d="M800 346 L800 375" class="accentStroke"/>
  <path d="M800 605 L800 635" class="accentStroke"/>
  <path d="M800 875 L800 915" class="accentStroke"/>
  <path d="M800 1570 L800 1600" class="accentStroke"/>
  <path d="M800 1710 L800 1740" class="accentStroke"/>

  <text x="80" y="2252" class="small">Suggested implementation order: Header → Hero → Featured → Category grid → Card system → Footer</text>
</svg>
