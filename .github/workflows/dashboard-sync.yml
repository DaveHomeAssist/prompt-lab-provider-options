name: Dashboard Sync

on:
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  update-dashboard:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Update Notion dashboard summary
        working-directory: prompt-lab-source
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          NOTION_VERSION: ${{ vars.NOTION_VERSION || '2022-06-28' }}
          DASHBOARD_PAGE_ID: ${{ vars.DASHBOARD_PAGE_ID || 'fd9255fc8f448343899e817c22804e09' }}
          DASHBOARD_DATABASE_ID: ${{ vars.DASHBOARD_DATABASE_ID || '79bd524b05634d1986962c706a55a704' }}
          DASHBOARD_DATA_SOURCE_ID: ${{ vars.DASHBOARD_DATA_SOURCE_ID || '68e6506d68934d61b74f2e8234d03a1e' }}
        run: npm run dashboard:update
